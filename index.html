<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Hexplore">
<link rel="apple-touch-icon" href="...">
<link rel="icon" type="image/png" href="...">
<meta name="theme-color" content="#101010">
<title>Hexplore</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    touch-action: none;
    overscroll-behavior: none;
  }

  :root {
    --bg: #101010;
    --surface: #202020;
    --muted: #404040;
    --text: #fff;
    --accent: #00a0e0;
    --danger: #c00000;
    --font: "Helvetica Neue", Helvetica, Arial, sans-serif;
    --safe-t: env(safe-area-inset-top, 0px);
    --safe-b: env(safe-area-inset-bottom, 0px);
    --safe-l: env(safe-area-inset-left, 0px);
    --safe-r: env(safe-area-inset-right, 0px);
  }

  html { background: var(--bg); }

  body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--bg);
    font-family: var(--font);
    color: var(--text);
    user-select: none; -webkit-user-select: none;
  }

  #map, #fog-svg {
    position: fixed;
    top: var(--safe-t);
    left: var(--safe-l);
    right: var(--safe-r);
    bottom: var(--bar-height, 140px);
  }
  #fog-svg {
    pointer-events: none;
    z-index: 450;
    overflow: visible;
  }

  #bar {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: var(--surface);
    border-top: 1px solid var(--muted);
    display: flex; flex-direction: column; align-items: center;
    padding: 10px calc(15px + var(--safe-r)) 0 calc(15px + var(--safe-l));
    padding-bottom: max(35px, calc(var(--safe-b) + 15px));
    gap: 10px;
    z-index: 500;
  }
  #status-line {
    font-size: 20px; font-weight: 600;
    color: var(--accent); letter-spacing: .01em;
    padding: 2px 8px;
  }
  #button-row { display: flex; gap: 10px; width: 100%; }
  .bar-btn {
    flex: 1; height: 60px;
    border: none; outline: none; border-radius: 15px;
    background: var(--muted); color: var(--text);
    font-family: var(--font);
    font-size: 18px; font-weight: 600; cursor: pointer;
    transition: background .15s, transform .1s;
    -webkit-appearance: none;
  }
  .bar-btn:active { transform: scale(.95); }
  .bar-btn.active { background: var(--accent); color: #fff; }
  .bar-btn.done-btn { background: var(--accent); color: #fff; }

  #btn-follow {
    display: none;
    position: fixed;
    top: calc(var(--safe-t) + 15px);
    left: calc(var(--safe-l) + 15px);
    width: 110px; height: 40px;
    border: none; outline: none; border-radius: 15px;
    background: var(--muted); color: var(--text);
    font-family: var(--font);
    font-size: 18px; font-weight: 600; cursor: pointer;
    transition: background .15s, transform .1s;
    -webkit-appearance: none;
    z-index: 480;
  }
  #btn-follow.visible { display: block; }
  #btn-follow:active { transform: scale(.95); }
  #btn-follow.active { background: var(--accent); color: #fff; }

  #btn-cancel-select {
    display: none;
    position: fixed;
    top: calc(var(--safe-t) + 15px);
    right: calc(var(--safe-r) + 15px);
    width: 110px; height: 40px;
    border: none; outline: none; border-radius: 15px;
    background: var(--muted); color: var(--text);
    font-family: var(--font);
    font-size: 18px; font-weight: 600; cursor: pointer;
    transition: background .15s, transform .1s;
    -webkit-appearance: none;
    z-index: 480;
  }
  #btn-cancel-select.visible { display: block; }
  #btn-cancel-select:active { transform: scale(.95); }

  #menu-overlay { display: none; position: fixed; inset: 0; z-index: 600; }
  #menu-overlay.open { display: block; }
  #menu-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.5); }

  #menu-sheet, #settings-sheet, #places-sheet {
    position: absolute; left: 0; right: 0; bottom: 0;
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 15px calc(15px + var(--safe-r)) 0 calc(15px + var(--safe-l));
    padding-bottom: max(35px, calc(var(--safe-b) + 15px));
    display: flex; flex-direction: column; gap: 10px;
    transition: transform .25s ease;
    height: calc(15px + 8px + 6 * 55px + 5 * 10px + max(35px, calc(var(--safe-b) + 15px)));
  }
  #places-list {
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    flex: 1;
    min-height: 0;
  }
  #settings-sheet { transform: translateX(100%); }
  #places-sheet { transform: translateX(100%); }
  #menu-overlay.open #menu-sheet { transform: translateX(0); }
  #menu-overlay.settings-open #menu-sheet { transform: translateX(-100%); }
  #menu-overlay.settings-open #settings-sheet { transform: translateX(0); }
  #menu-overlay.places-open #menu-sheet { transform: translateX(-100%); }
  #menu-overlay.places-open #places-sheet { transform: translateX(0); }

  #menu-handle, #settings-handle, #places-handle {
    width: 40px; height: 4px; border-radius: 2px;
    background: var(--muted); align-self: center; margin-bottom: 4px; flex-shrink: 0;
  }
  .menu-btn {
    width: 100%; height: 55px;
    border: none; outline: none; border-radius: 15px;
    background: var(--muted); color: var(--text);
    font-family: var(--font);
    font-size: 18px; font-weight: 600; cursor: pointer;
    -webkit-appearance: none;
    transition: background .15s, transform .1s;
    flex-shrink: 0;
  }
  .menu-btn:active { transform: scale(.95); }
  .menu-btn.danger { background: var(--danger); color: #fff; }
  .menu-btn.back-btn { background: var(--accent); color: #fff; }
  .menu-btn.disabled { opacity: 0.35; pointer-events: none; }

  #places-list {
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    flex: 1; min-height: 0; display: flex; flex-direction: column; gap: 8px;
  }
  .place-item {
    width: 100%; min-height: 55px; border: none; outline: none; border-radius: 15px;
    background: var(--muted); color: var(--text); font-family: var(--font);
    font-size: 18px; font-weight: 600; cursor: pointer; -webkit-appearance: none;
    transition: background .15s, transform .1s;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; flex-shrink: 0;
  }
  .place-item:active { transform: scale(.95); }
  .place-item-name { flex: 1; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .place-item-count { font-size: 18px; font-weight: 600; color: var(--accent); margin-left: 10px; white-space: nowrap; flex-shrink: 0; }

  #confirm-overlay {
    display: none; position: fixed; inset: 0; z-index: 700;
    background: rgba(0,0,0,.65);
    align-items: center; justify-content: center;
  }
  #confirm-overlay.open { display: flex; }
  #confirm-box {
    background: var(--surface); border-radius: 20px;
    padding: 28px 20px 20px;
    width: min(300px, 90vw);
    display: flex; flex-direction: column; gap: 15px; align-items: center;
  }
  #confirm-box p { font-size: 20px; font-weight: 700; text-align: center; }
  .confirm-row { display: flex; gap: 10px; width: 100%; }
  .confirm-row button {
    flex: 1; height: 50px;
    border: none; outline: none; border-radius: 15px;
    font-family: var(--font);
    font-size: 16px; font-weight: 600; cursor: pointer;
    -webkit-appearance: none;
  }
  #confirm-cancel { background: var(--muted); color: var(--text); }
  #confirm-ok { background: var(--danger); color: #fff; }

  .leaflet-container.select-active { cursor: pointer !important; }
  .leaflet-container.select-active .leaflet-grab { cursor: pointer !important; }

  .leaflet-control-attribution {
    background: rgba(0,0,0,0.5) !important;
    color: #c0c0c0 !important;
  }
  .leaflet-control-attribution a { color: var(--accent) !important; }
</style>
</head>
<body>

<div id="probe-t" style="position:fixed;top:0;left:0;width:1px;height:env(safe-area-inset-top,0px);visibility:hidden;"></div>
<div id="probe-b" style="position:fixed;bottom:0;left:0;width:1px;height:env(safe-area-inset-bottom,0px);visibility:hidden;"></div>
<div id="probe-l" style="position:fixed;top:0;left:0;width:env(safe-area-inset-left,0px);height:1px;visibility:hidden;"></div>
<div id="probe-r" style="position:fixed;top:0;right:0;width:env(safe-area-inset-right,0px);height:1px;visibility:hidden;"></div>

<div id="map"></div>
<svg id="fog-svg" xmlns="http://www.w3.org/2000/svg"></svg>
<canvas id="mist-canvas" style="position:fixed;top:var(--safe-t);left:var(--safe-l);right:var(--safe-r);bottom:var(--bar-height,140px);pointer-events:none;z-index:451;display:none;"></canvas>
<button id="btn-follow">Follow</button>
<button id="btn-cancel-select">Cancel</button>

<div id="bar">
  <div id="status-line">0 hexagons</div>
  <div id="button-row">
    <button class="bar-btn" id="btn-menu">Menu</button>
    <button class="bar-btn" id="btn-location">Use location</button>
    <button class="bar-btn" id="btn-select">Select</button>
  </div>
</div>

<div id="menu-overlay">
  <div id="menu-backdrop"></div>
  <div id="menu-sheet">
    <div id="menu-handle"></div>
    <button class="menu-btn back-btn" id="menu-back">Back</button>
    <button class="menu-btn" id="menu-places-open">Places</button>
    <button class="menu-btn" id="menu-settings-open">Settings</button>
    <button class="menu-btn" id="menu-save">Export</button>
    <button class="menu-btn" id="menu-load">Import</button>
    <button class="menu-btn danger" id="menu-clear">Clear data</button>
  </div>
  <div id="settings-sheet">
    <div id="settings-handle"></div>
    <button class="menu-btn back-btn" id="settings-back">Back</button>
    <button class="menu-btn" id="menu-mist">Mist: Off</button>
    <button class="menu-btn" id="menu-discovery">Minimum discovery: 100</button>
    <button class="menu-btn" id="menu-milestone">Notify every: 500</button>
    <button class="menu-btn" id="menu-sound">Sound: On</button>
    <button class="menu-btn" id="menu-theme">Theme: Default</button>
  </div>
  <div id="places-sheet">
    <div id="places-handle"></div>
    <button class="menu-btn back-btn" id="places-back">Back</button>
    <div id="places-list"></div>
  </div>
</div>

<div id="confirm-overlay">
  <div id="confirm-box">
    <p>Are you sure?</p>
    <div class="confirm-row">
      <button id="confirm-cancel">Cancel</button>
      <button id="confirm-ok">Clear</button>
    </div>
  </div>
</div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
'use strict';
const CITIES_DATA = `...`;

const CALIBRATION_LATITUDE = 35;
const METRES_PER_DEGREE = 111320;
const TARGET_HEX_METRES = 100;

const pxPerMetreAtEquator = (256 / 360) / METRES_PER_DEGREE;
const pxPerMetreAtCalibration = pxPerMetreAtEquator / Math.cos(CALIBRATION_LATITUDE * Math.PI / 180);
const HEX_RADIUS_PX0 = (TARGET_HEX_METRES / 2) * pxPerMetreAtCalibration;

function hexKey(q, r) { return `${q},${r}`; }
function parseHexKey(key) {
  const [q, r] = key.split(',').map(Number);
  return { q, r };
}

function axialToPixel0(q, r) {
  return {
    x: HEX_RADIUS_PX0 * 1.5 * q,
    y: HEX_RADIUS_PX0 * Math.sqrt(3) * (r + q / 2),
  };
}

function latLngToHexKey(lat, lng) {
  const p = map.project(L.latLng(lat, lng), 0);
  const fq = p.x * 2 / (3 * HEX_RADIUS_PX0);
  const fr = p.y / (Math.sqrt(3) * HEX_RADIUS_PX0) - fq / 2;
  const fs = -fq - fr;
  let q = Math.round(fq), r = Math.round(fr), s = Math.round(fs);
  const dq = Math.abs(q - fq), dr = Math.abs(r - fr), ds = Math.abs(s - fs);
  if (dq > dr && dq > ds) q = -r - s;
  else if (dr > ds) r = -q - s;
  return hexKey(q, r);
}

function hexNeighbours(q, r) {
  return [[q+1,r], [q-1,r], [q,r+1], [q,r-1], [q+1,r-1], [q-1,r+1]];
}

function hexCenterOnScreen(q, r) {
  const { x, y } = axialToPixel0(q, r);
  const scale = Math.pow(2, map.getZoom());
  const absolutePixel = L.point(x * scale, y * scale);
  const origin = map.getPixelOrigin();
  const layerPoint = L.point(absolutePixel.x - origin.x, absolutePixel.y - origin.y);
  return map.layerPointToContainerPoint(layerPoint);
}

function hexCornersOnScreen(q, r) {
  const center = hexCenterOnScreen(q, r);
  const radius = HEX_RADIUS_PX0 * Math.pow(2, map.getZoom());
  const corners = [];
  for (let i = 0; i < 6; i++) {
    const angle = i * (Math.PI / 3);
    corners.push({ x: center.x + radius * Math.cos(angle), y: center.y + radius * Math.sin(angle) });
  }
  return corners;
}

function hexSvgPath(q, r) {
  const corners = hexCornersOnScreen(q, r);
  const points = corners.map(p => `${p.x.toFixed(2)},${p.y.toFixed(2)}`).join(' L ');
  return `M ${points} Z`;
}

function hexKeyToLatLng(key) {
  const { q, r } = parseHexKey(key);
  const { x, y } = axialToPixel0(q, r);
  return map.unproject(L.point(x, y), 0);
}

function haversineDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) ** 2 +
    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

const map = L.map('map', {
  center: [20, 0],
  zoom: 3,
  zoomControl: false,
  attributionControl: true,
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 19,
}).addTo(map);

function syncBarHeight() {
  const height = document.getElementById('bar').getBoundingClientRect().height;
  document.documentElement.style.setProperty('--bar-height', height + 'px');
}

function syncSafeArea() {
  const root = document.documentElement;
  const top = document.getElementById('probe-t').getBoundingClientRect().height;
  const bottom = document.getElementById('probe-b').getBoundingClientRect().height;
  const left = document.getElementById('probe-l').getBoundingClientRect().width;
  const right = document.getElementById('probe-r').getBoundingClientRect().width;
  root.style.setProperty('--safe-t', top + 'px');
  root.style.setProperty('--safe-b', bottom + 'px');
  root.style.setProperty('--safe-l', left + 'px');
  root.style.setProperty('--safe-r', right + 'px');
}

function syncFogSvgSize() {
  const svg = document.getElementById('fog-svg');
  const rect = svg.getBoundingClientRect();
  svg.setAttribute('width', Math.ceil(rect.width));
  svg.setAttribute('height', Math.ceil(rect.height));
}

function syncMistCanvasCssPosition() {
  const rect = document.getElementById('map').getBoundingClientRect();
  mistCanvas.style.left = rect.left + 'px';
  mistCanvas.style.top = rect.top + 'px';
  mistCanvas.style.width = rect.width + 'px';
  mistCanvas.style.height = rect.height + 'px';
}

function syncMistCanvasSize() {
  const dpr = window.devicePixelRatio || 1;
  const rect = mistCanvas.getBoundingClientRect();
  mistCanvas.width = Math.ceil(rect.width) * dpr;
  mistCanvas.height = Math.ceil(rect.height) * dpr;
}

function syncLayout(includeFog) {
  syncSafeArea();
  syncBarHeight();
  syncFogSvgSize();
  if (mistOn) {
    syncMistCanvasCssPosition();
    syncMistCanvasSize();
  }
  const centerBefore = map.getCenter();
  map.invalidateSize({ animate: false, pan: false });
  map.setView(centerBefore, map.getZoom(), { animate: false });
  if (includeFog) drawFog();
  if (followMode && userLatLng) {
    isProgrammaticMove = true;
    map.panTo([userLatLng.lat, userLatLng.lng], { animate: false });
    isProgrammaticMove = false;
  }
}

let revealedHexagons = new Set();
let draftHexagons = null;
let trackingOn = false;
let selectMode = false;
let userLatLng = null;
let userAccuracy = null;
let watchId = null;
let hasSnappedToUser = false;
let followMode = false;
let isProgrammaticMove = false;
let userMarker = null;
let userAccuracyCircle = null;
let fogLayer = null;
let borderLayer = null;
let cachedBorderHexagons = null;

const MIST_KEY = 'hexplore_mist_v1';
let mistOn = false;
try {
  const savedMist = localStorage.getItem(MIST_KEY);
  if (savedMist !== null) mistOn = savedMist === 'true';
} catch (e) {}

const mistCanvas = document.getElementById('mist-canvas');

syncLayout(false);

const THEMES = {
  default: {
    name: 'Default',
    '--bg': '#101010',
    '--surface': '#202020',
    '--muted': '#404040',
    '--text': '#fff',
    '--accent': '#00a0e0',
    '--danger': '#c00000',
    '--font': '"Helvetica Neue", Helvetica, Arial, sans-serif',
    locationColor: '#00a0e0',
  },
  spring: {
    name: 'Spring',
    '--bg': '#081808',
    '--surface': '#102010',
    '--muted': '#284830',
    '--text': '#709870',
    '--accent': '#f08040',
    '--danger': '#d04040',
    '--font': 'Futura, "Trebuchet MS", Arial, sans-serif',
    locationColor: '#f08040',
  },
  summer: {
    name: 'Summer',
    '--bg': '#001830',
    '--surface': '#002848',
    '--muted': '#004070',
    '--text': '#fff',
    '--accent': '#d09000',
    '--danger': '#d04000',
    '--font': 'Futura, "Trebuchet MS", Arial, sans-serif',
    locationColor: '#00a0e0',
  },
  autumn: {
    name: 'Autumn',
    '--bg': '#201000',
    '--surface': '#382010',
    '--muted': '#604030',
    '--text': '#e8c098',
    '--accent': '#d08030',
    '--danger': '#c85820',
    '--font': 'Georgia, "Times New Roman", serif',
    locationColor: '#f0a050',
  },
  winter: {
    name: 'Winter',
    '--bg': '#e8f0f8',
    '--surface': '#c0d8f0',
    '--muted': '#80b0e0',
    '--text': '#003068',
    '--accent': '#0060d0',
    '--danger': '#c02080',
    '--font': 'Georgia, "Times New Roman", serif',
    locationColor: '#0080f0',
  },
  orange: {
    name: 'Orange',
    '--bg': '#180c00',
    '--surface': '#281800',
    '--muted': '#482800',
    '--text': '#fff',
    '--accent': '#ff6800',
    '--danger': '#c00020',
    '--font': '"Courier New", Courier, monospace',
    locationColor: '#ff6800',
  },
  blue: {
    name: 'Blue',
    '--bg': '#101820',
    '--surface': '#182030',
    '--muted': '#304050',
    '--text': '#A0D0E8',
    '--accent': '#40a0d0',
    '--danger': '#d03030',
    '--font': '"Courier New", Courier, monospace',
    locationColor: '#00a0e0',
  },
  magenta: {
    name: 'Magenta',
    '--bg': '#180810',
    '--surface': '#281020',
    '--muted': '#482040',
    '--text': '#f8b0d0',
    '--accent': '#f060a0',
    '--danger': '#d84050',
    '--font': '"Courier New", Courier, monospace',
    locationColor: '#f060a0',
  },
  light: {
    name: 'Light',
    '--bg': '#fff',
    '--surface': '#e0e0e0',
    '--muted': '#c0c0c0',
    '--text': '#101010',
    '--accent': '#00a0e0',
    '--danger': '#c00000',
    '--font': '"Helvetica Neue", Helvetica, Arial, sans-serif',
    locationColor: '#00a0e0',
  },
};

const THEME_ORDER = ['default', 'spring', 'summer', 'autumn', 'winter', 'orange', 'blue', 'magenta', 'light'];
const THEME_KEY = 'hexplore_theme_v1';
let currentThemeName = 'default';
try {
  const saved = localStorage.getItem(THEME_KEY);
  if (saved && THEMES[saved]) currentThemeName = saved;
} catch (e) {}

function applyTheme(name) {
  const theme = THEMES[name] || THEMES.default;
  currentThemeName = name;
  const root = document.documentElement;
  for (const [prop, val] of Object.entries(theme)) {
    if (prop.startsWith('--')) root.style.setProperty(prop, val);
  }
  if (fogLayer) fogLayer.setAttribute('fill', theme['--bg']);
  if (borderLayer) borderLayer.setAttribute('fill', theme['--bg']);
  rebuildUserLocationIcon(theme.locationColor);
  if (mistOn && !selectMode) redrawFog();
  const metaTheme = document.querySelector('meta[name="theme-color"]');
  if (metaTheme) metaTheme.setAttribute('content', theme['--bg']);
}

function rebuildUserLocationIcon(color) {
  if (userMarker) userMarker.setIcon(makeLocationIcon(color));
  if (userAccuracyCircle) userAccuracyCircle.setStyle({ color, fillColor: color });
}

function makeLocationIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="width:18px;height:18px;border-radius:50%;background:${color};border:3px solid #fff;box-shadow:0 0 8px ${color}cc;"></div>`,
    iconSize: [18, 18],
    iconAnchor: [9, 9],
  });
}

const SOUND_KEY = 'hexplore_sound_v1';
let soundOn = true;
try {
  const savedSound = localStorage.getItem(SOUND_KEY);
  if (savedSound !== null) soundOn = savedSound === 'true';
} catch (e) {}

let audioCtx = null;

function createAudioCtx() {
  return new (window.AudioContext || window.webkitAudioContext)();
}

function getAudioCtx() {
  if (!audioCtx || audioCtx.state === 'closed') audioCtx = createAudioCtx();
  return audioCtx;
}

function scheduleTone(ctx, freqStart, freqEnd, duration, volume, startOffset) {
  const startTime = ctx.currentTime + (startOffset || 0);
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.frequency.setValueAtTime(freqStart, startTime);
  osc.frequency.exponentialRampToValueAtTime(freqEnd, startTime + duration);
  gain.gain.setValueAtTime(volume, startTime);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(startTime);
  osc.stop(startTime + duration);
}

function resumeWithTimeout(ctx, ms) {
  return Promise.race([
    ctx.resume().then(() => ctx.state),
    new Promise((resolve) => setTimeout(() => resolve(ctx.state), ms)),
  ]);
}

function tone(freqStart, freqEnd, duration, volume, startOffset) {
  if (!soundOn) return;
  const ctx = getAudioCtx();
  if (ctx.state === 'running') {
    scheduleTone(ctx, freqStart, freqEnd, duration, volume, startOffset);
    return;
  }
  resumeWithTimeout(ctx, 300).then((state) => {
    if (state === 'running') {
      scheduleTone(ctx, freqStart, freqEnd, duration, volume, startOffset);
      return;
    }
    audioCtx = createAudioCtx();
    const freshCtx = audioCtx;
    resumeWithTimeout(freshCtx, 300).then((freshState) => {
      if (freshState === 'running') scheduleTone(freshCtx, freqStart, freqEnd, duration, volume, startOffset);
    });
  });
}

function playOpenSound() { tone(325, 550, 0.05, 0.5, 0); tone(450, 325, 0.05, 0.5, 0.05); }
function playCloseSound() { tone(450, 325, 0.05, 0.5, 0); tone(325, 550, 0.05, 0.5, 0.05); }
function playStartSound() { tone(450, 325, 0.05, 0.5); }
function playStopSound() { tone(325, 550, 0.05, 0.5); }
function playDiscoverySound() {
  tone(325, 450, 0.05, 0.5, 0);
  tone(388, 500, 0.05, 0.5, 0.05);
  tone(450, 550, 0.05, 0.5, 0.1);
}

const MILESTONE_COUNT_KEY = 'hexplore_milestone_count_v1';
const MILESTONE_STEP_KEY = 'hexplore_milestone_step_v1';
const MILESTONE_STEPS = [20, 50, 100, 200, 500, 1000, 2000, 5000, 10000, 'Off'];
let milestoneStep = 500;
try {
  const saved = localStorage.getItem(MILESTONE_STEP_KEY);
  if (saved !== null) {
    if (saved === 'Off') milestoneStep = 'Off';
    else {
      const parsed = parseInt(saved, 10);
      if (MILESTONE_STEPS.includes(parsed)) milestoneStep = parsed;
    }
  }
} catch (e) {}

function getMilestoneBaseline() {
  try {
    const saved = localStorage.getItem(MILESTONE_COUNT_KEY);
    if (saved !== null) return parseInt(saved, 10) || 0;
  } catch (e) {}
  return 0;
}

function setMilestoneBaseline(n) {
  try { localStorage.setItem(MILESTONE_COUNT_KEY, String(n)); } catch (e) {}
}

let milestoneBaseline = getMilestoneBaseline();

function checkMilestone(newCount) {
  if (milestoneStep === 'Off') { milestoneBaseline = newCount; setMilestoneBaseline(milestoneBaseline); return; }
  const previousFloor = Math.floor(milestoneBaseline / milestoneStep);
  const newFloor = Math.floor(newCount / milestoneStep);
  milestoneBaseline = newCount;
  setMilestoneBaseline(milestoneBaseline);
  if (newFloor > previousFloor) sendMilestoneNotification(newFloor * milestoneStep);
}

function resetMilestoneBaseline(newCount) {
  milestoneBaseline = newCount;
  setMilestoneBaseline(milestoneBaseline);
}

function sendNotification(body) {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'granted') {
    new Notification('Hexplore', { body });
  } else if (Notification.permission !== 'denied') {
    Notification.requestPermission().then((perm) => {
      if (perm === 'granted') new Notification('Hexplore', { body });
    });
  }
}

function sendMilestoneNotification(milestone) {
  sendNotification(`You have ${milestone} hexagons!`);
}

function sendPlaceDiscoveredNotification(placeName) {
  sendNotification(`You have discovered ${placeName}!`);
}

const STORAGE_KEY = 'hexplore_v1';
const NO_LOCATION_KEY = '__no_location__';

let placesData = new Map();

function buildSaveObject() {
  const places = {};
  for (const [pkey, val] of placesData) {
    places[pkey] = { name: val.name, hexagons: [...val.hexagons] };
  }
  const lines = Object.entries(places).map(([k, v]) => JSON.stringify(k) + ':' + JSON.stringify(v));
  return '{' + lines.join(',\n') + '}';
}

function saveAll() {
  try { localStorage.setItem(STORAGE_KEY, buildSaveObject()); } catch (e) {}
}

function loadAll() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (!data || typeof data !== 'object') return;
    placesData = new Map();
    revealedHexagons = new Set();
    for (const [pkey, val] of Object.entries(data)) {
      if (!val || typeof val !== 'object' || !Array.isArray(val.hexagons)) continue;
      const hexSet = new Set(val.hexagons);
      const coords = pkey === NO_LOCATION_KEY ? [null, null] : pkey.split(',').map(Number);
      placesData.set(pkey, { name: val.name ?? null, lat: coords[0], lng: coords[1], hexagons: hexSet });
      for (const key of hexSet) revealedHexagons.add(key);
    }
  } catch (e) {}
}

function activeHexagons() { return selectMode ? draftHexagons : revealedHexagons; }

loadAll();

const MAX_PLACE_DISTANCE_M = 50000;

const DISCOVERY_STEP_KEY = 'hexplore_discovery_step_v1';
const DISCOVERY_STEPS = [20, 50, 100, 200, 500, 1000];
let placesThreshold = 100;
try {
  const saved = localStorage.getItem(DISCOVERY_STEP_KEY);
  if (saved !== null) {
    const parsed = parseInt(saved, 10);
    if (DISCOVERY_STEPS.includes(parsed)) placesThreshold = parsed;
  }
} catch (e) {}

let cityData = [];

function loadCities() {
  if (typeof CITIES_DATA === 'undefined') return;
  cityData = CITIES_DATA.split('|').map(row => {
    const parts = row.split('\t');
    return { name: parts[0], lat: parseFloat(parts[1]), lng: parseFloat(parts[2]) };
  });
}

function nearestCity(tileLat, tileLng) {
  let best = null;
  let bestDist = Infinity;
  for (const city of cityData) {
    const d = haversineDistance(tileLat, tileLng, city.lat, city.lng);
    if (d < bestDist) { bestDist = d; best = city; }
  }
  return { city: best, distance: bestDist };
}

function cityKey(lat, lng) {
  return lat + ',' + lng;
}

function placeForHex(hexKey) {
  const ll = hexKeyToLatLng(hexKey);
  const { city, distance } = nearestCity(ll.lat, ll.lng);
  if (!city || distance > MAX_PLACE_DISTANCE_M) return null;
  return { name: city.name, lat: city.lat, lng: city.lng, key: cityKey(city.lat, city.lng) };
}

function addHexToPlaces(hexKey) {
  const place = placeForHex(hexKey);
  const pkey = place ? place.key : NO_LOCATION_KEY;
  if (!placesData.has(pkey)) {
    placesData.set(pkey, place
      ? { name: place.name, lat: place.lat, lng: place.lng, hexagons: new Set() }
      : { name: null, lat: null, lng: null, hexagons: new Set() });
  }
  const entry = placesData.get(pkey);
  if (entry.hexagons.has(hexKey)) return;
  const wasUnlocked = entry.hexagons.size >= placesThreshold;
  entry.hexagons.add(hexKey);
  const nowUnlocked = entry.hexagons.size >= placesThreshold;
  if (nowUnlocked) renderPlacesList();
  if (nowUnlocked && !wasUnlocked) { playDiscoverySound(); sendPlaceDiscoveredNotification(entry.name); }
  else if (wasUnlocked) renderPlacesList();
}

function updateExportButton() {
  const btn = document.getElementById('menu-save');
  btn.classList.toggle('disabled', revealedHexagons.size === 0);
}

function updatePlacesButton() {
  const btn = document.getElementById('menu-places-open');
  let hasPlaces = false;
  for (const [pkey, data] of placesData) {
    if (pkey === NO_LOCATION_KEY) continue;
    if (data.hexagons.size >= placesThreshold) { hasPlaces = true; break; }
  }
  btn.classList.toggle('disabled', !hasPlaces);
}

function reconcilePlacesWithRevealedHexagons() {
  for (const [pkey, entry] of [...placesData]) {
    for (const key of [...entry.hexagons]) {
      if (!revealedHexagons.has(key)) entry.hexagons.delete(key);
    }
    if (entry.hexagons.size === 0) placesData.delete(pkey);
  }
  renderPlacesList();
  updateExportButton();
}

function renderPlacesList() {
  const list = document.getElementById('places-list');
  list.querySelectorAll('.place-item').forEach(el => el.remove());
  const visited = [];
  for (const [pkey, data] of placesData) {
    if (pkey === NO_LOCATION_KEY) continue;
    if (data.hexagons.size >= placesThreshold) {
      visited.push({ pkey, name: data.name, lat: data.lat, lng: data.lng, count: data.hexagons.size });
    }
  }
  visited.sort((a, b) => b.count - a.count || a.name.localeCompare(b.name));
  for (const place of visited) {
    const btn = document.createElement('button');
    btn.className = 'place-item';
    btn.innerHTML = `<span class="place-item-name">${place.name}</span><span class="place-item-count">${place.count} hexagons</span>`;
    btn.addEventListener('click', () => {
      playDiscoverySound();
      if (followMode) setFollowMode(false);
      document.getElementById('menu-overlay').classList.remove('open', 'settings-open', 'places-open');
      const entry = placesData.get(place.pkey);
      let bestKey = null;
      let bestDist = Infinity;
      for (const key of entry.hexagons) {
        const ll = hexKeyToLatLng(key);
        const d = haversineDistance(place.lat, place.lng, ll.lat, ll.lng);
        if (d < bestDist) { bestDist = d; bestKey = key; }
      }
      if (bestKey) {
        const ll = hexKeyToLatLng(bestKey);
        map.setView([ll.lat, ll.lng], 15, { animate: false });
      } else {
        map.setView([place.lat, place.lng], 15, { animate: false });
      }
    });
    list.appendChild(btn);
  }
  updatePlacesButton();
}

function snapToRandomRevealedHexagon() {
  if (revealedHexagons.size === 0) { map.setView([20, 0], 3, { animate: false }); return; }
  const keys = [...revealedHexagons];
  const randomKey = keys[Math.floor(Math.random() * keys.length)];
  const { q, r } = parseHexKey(randomKey);
  const { x, y } = axialToPixel0(q, r);
  const latLng = map.unproject(L.point(x, y), 0);
  map.setView(latLng, 15, { animate: false });
}

snapToRandomRevealedHexagon();

const fogSvg = document.getElementById('fog-svg');
const SVG_NS = 'http://www.w3.org/2000/svg';
const WORLD_RECT = 'M -99999,-99999 L 99999,-99999 L 99999,99999 L -99999,99999 Z ';

function getBorderHexagons() {
  if (cachedBorderHexagons) return cachedBorderHexagons;
  cachedBorderHexagons = new Set();
  const hexes = activeHexagons();
  for (const key of hexes) {
    const { q, r } = parseHexKey(key);
    for (const [nq, nr] of hexNeighbours(q, r)) {
      const nk = hexKey(nq, nr);
      if (!hexes.has(nk)) cachedBorderHexagons.add(nk);
    }
  }
  return cachedBorderHexagons;
}

function invalidateBorderCache() { cachedBorderHexagons = null; }

function ensureFogLayers() {
  if (!fogLayer) {
    fogLayer = document.createElementNS(SVG_NS, 'path');
    fogLayer.setAttribute('fill-rule', 'evenodd');
    fogLayer.setAttribute('fill', THEMES[currentThemeName]['--bg']);
    fogLayer.setAttribute('pointer-events', 'none');
    fogSvg.appendChild(fogLayer);
  }
  if (!borderLayer) {
    borderLayer = document.createElementNS(SVG_NS, 'path');
    borderLayer.setAttribute('fill', THEMES[currentThemeName]['--bg']);
    borderLayer.setAttribute('pointer-events', 'none');
    fogSvg.appendChild(borderLayer);
  }
}

function redrawFog() { invalidateBorderCache(); drawFog(); }

const MIST_CLEAR_METRES = 50;
const MIST_FADE_METRES = 120;
const MIST_BORDER_CLEAR_METRES = 0;
const MIST_BORDER_FADE_METRES = 105;
const MIST_BORDER_PEAK_ALPHA = 0.32;
const MIST_GRADIENT_STOPS = 8;

function buildEaseStops(exponent, peakAlpha, n) {
  const stops = [];
  for (let i = 0; i <= n; i++) {
    const t = i / n;
    stops.push([t, peakAlpha * Math.pow(1 - t, exponent)]);
  }
  return stops;
}

function makeRadialGradient(ctx, cx, cy, r0, r1, stops) {
  const grad = ctx.createRadialGradient(cx, cy, r0, cx, cy, r1);
  for (const [t, a] of stops) {
    grad.addColorStop(t, `rgba(0,0,0,${a.toFixed(4)})`);
  }
  return grad;
}

function metresToScreenPx(metres) {
  const centre = map.getCenter();
  const p0 = map.latLngToContainerPoint(L.latLng(centre.lat, centre.lng));
  const p1 = map.latLngToContainerPoint(L.latLng(centre.lat + 0.001, centre.lng));
  const pxPerDegLat = Math.abs(p1.y - p0.y) / 0.001;
  const pxPerMetre = pxPerDegLat / METRES_PER_DEGREE;
  return metres * pxPerMetre;
}

function parseBgColor(hex) {
  const s = hex.trim();
  const m6 = s.match(/^#([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i);
  if (m6) return [parseInt(m6[1], 16), parseInt(m6[2], 16), parseInt(m6[3], 16)];
  const m3 = s.match(/^#([0-9a-f])([0-9a-f])([0-9a-f])$/i);
  if (m3) return [parseInt(m3[1] + m3[1], 16), parseInt(m3[2] + m3[2], 16), parseInt(m3[3] + m3[3], 16)];
  return [16, 16, 16];
}

function drawMistCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const w = mistCanvas.width;
  const h = mistCanvas.height;
  const ctx = mistCanvas.getContext('2d');

  const theme = THEMES[currentThemeName] || THEMES.default;
  const [bgR, bgG, bgB] = parseBgColor(theme['--bg']);

  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = `rgb(${bgR},${bgG},${bgB})`;
  ctx.globalAlpha = 0.98;
  ctx.fillRect(0, 0, w, h);
  ctx.globalAlpha = 1;

  const hexes = activeHexagons();
  if (hexes.size === 0) return;

  const clearPx = metresToScreenPx(MIST_CLEAR_METRES) * dpr;
  const fadePx = metresToScreenPx(MIST_FADE_METRES) * dpr;
  const bClearPx = metresToScreenPx(MIST_BORDER_CLEAR_METRES) * dpr;
  const bFadePx = metresToScreenPx(MIST_BORDER_FADE_METRES) * dpr;

  const revealStops = buildEaseStops(2.2, 1.0, MIST_GRADIENT_STOPS);
  const borderStops = buildEaseStops(2.5, MIST_BORDER_PEAK_ALPHA, MIST_GRADIENT_STOPS);

  ctx.globalCompositeOperation = 'destination-out';

  for (const key of hexes) {
    const { q, r: hr } = parseHexKey(key);
    const sc = hexCenterOnScreen(q, hr);
    const cx = sc.x * dpr;
    const cy = sc.y * dpr;
    if (cx < -fadePx || cy < -fadePx || cx > w + fadePx || cy > h + fadePx) continue;
    ctx.fillStyle = makeRadialGradient(ctx, cx, cy, clearPx, fadePx, revealStops);
    ctx.beginPath();
    ctx.arc(cx, cy, fadePx, 0, Math.PI * 2);
    ctx.fill();
  }

  const borders = getBorderHexagons();
  for (const key of borders) {
    const { q, r: hr } = parseHexKey(key);
    const sc = hexCenterOnScreen(q, hr);
    const cx = sc.x * dpr;
    const cy = sc.y * dpr;
    if (cx < -bFadePx || cy < -bFadePx || cx > w + bFadePx || cy > h + bFadePx) continue;
    ctx.fillStyle = makeRadialGradient(ctx, cx, cy, bClearPx, bFadePx, borderStops);
    ctx.beginPath();
    ctx.arc(cx, cy, bFadePx, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.globalCompositeOperation = 'source-over';
}

function drawFog() {
  ensureFogLayers();

  if (mistOn && !selectMode) {
    fogLayer.setAttribute('d', 'M 0 0 Z');
    borderLayer.setAttribute('d', 'M 0 0 Z');

    mistCanvas.style.display = '';
    syncMistCanvasCssPosition();
    syncMistCanvasSize();
    drawMistCanvas();
  } else {
    mistCanvas.style.display = 'none';

    const fogOpacity = selectMode ? 0.5 : 0.98;
    const borderOpacity = 0.5;
    const hexes = activeHexagons();
    const borders = getBorderHexagons();

    const revealedPaths = [];
    for (const key of hexes) {
      const { q, r } = parseHexKey(key);
      revealedPaths.push(hexSvgPath(q, r));
    }
    const borderPaths = [];
    for (const key of borders) {
      const { q, r } = parseHexKey(key);
      borderPaths.push(hexSvgPath(q, r));
    }

    fogLayer.setAttribute('fill-opacity', String(fogOpacity));
    fogLayer.setAttribute('d', WORLD_RECT + revealedPaths.join(' ') + ' ' + borderPaths.join(' '));
    borderLayer.setAttribute('fill-opacity', String(borderOpacity));
    borderLayer.setAttribute('d', borderPaths.join(' ') || 'M 0 0 Z');
  }
}

map.on('move zoom viewreset', drawFog);

map.on('click', (e) => {
  if (!selectMode) return;
  if (map.getZoom() < 15) return;
  toggleHexagon(latLngToHexKey(e.latlng.lat, e.latlng.lng));
});

function toggleHexagon(key) {
  if (!selectMode || !draftHexagons) return;
  if (trackingOn && userLatLng && userAccuracy < 100) {
    const userKey = latLngToHexKey(userLatLng.lat, userLatLng.lng);
    if (key === userKey && draftHexagons.has(key)) return;
  }
  if (draftHexagons.has(key)) { draftHexagons.delete(key); playStopSound(); }
  else { draftHexagons.add(key); playStartSound(); }
  redrawFog();
  updateStatusLine();
}

function onPositionUpdate(position) {
  const { latitude: lat, longitude: lng, accuracy } = position.coords;
  const isFirstFix = !hasSnappedToUser;
  userLatLng = { lat, lng };
  userAccuracy = accuracy;

  if (!hasSnappedToUser) {
    hasSnappedToUser = true;
    isProgrammaticMove = true;
    map.setView([lat, lng], 17, { animate: false });
    isProgrammaticMove = false;
  } else if (followMode) {
    isProgrammaticMove = true;
    map.panTo([lat, lng], { animate: false });
    isProgrammaticMove = false;
  }

  const theme = THEMES[currentThemeName] || THEMES.default;
  if (!userMarker) {
    userMarker = L.marker([lat, lng], { icon: makeLocationIcon(theme.locationColor), zIndexOffset: 1000 }).addTo(map);
  } else {
    userMarker.setLatLng([lat, lng]);
  }

  if (!userAccuracyCircle) {
    userAccuracyCircle = L.circle([lat, lng], {
      radius: accuracy, color: theme.locationColor, fillColor: theme.locationColor,
      fillOpacity: 0.08, weight: 1, opacity: 0.4,
    }).addTo(map);
  } else {
    userAccuracyCircle.setLatLng([lat, lng]).setRadius(accuracy);
  }

  if (accuracy < 100) {
    const key = latLngToHexKey(lat, lng);
    if (!revealedHexagons.has(key)) {
      revealedHexagons.add(key);
      if (draftHexagons) draftHexagons.add(key);
      addHexToPlaces(key);
      saveAll();
      redrawFog();
      if (!isFirstFix) playStartSound();
      checkMilestone(revealedHexagons.size);
      updateExportButton();
    }
  }
  updateStatusLine();
}

function onPositionError(error) { console.warn('Geolocation error:', error.message); }

function startTracking() {
  trackingOn = true;
  hasSnappedToUser = false;
  document.getElementById('btn-location').textContent = 'Stop tracking';
  document.getElementById('btn-location').classList.add('active');
  document.getElementById('btn-follow').classList.add('visible');
  setFollowMode(false);
  watchId = navigator.geolocation.watchPosition(onPositionUpdate, onPositionError, {
    enableHighAccuracy: true, maximumAge: 2000, timeout: 10000,
  });
}

function stopTracking() {
  trackingOn = false;
  document.getElementById('btn-location').textContent = 'Use location';
  document.getElementById('btn-location').classList.remove('active');
  document.getElementById('btn-follow').classList.remove('visible');
  setFollowMode(false);
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  if (userMarker) { map.removeLayer(userMarker); userMarker = null; }
  if (userAccuracyCircle) { map.removeLayer(userAccuracyCircle); userAccuracyCircle = null; }
  userLatLng = null; userAccuracy = null;
  updateStatusLine();
}

function setFollowMode(on) {
  const wasOn = followMode;
  followMode = on;
  const btn = document.getElementById('btn-follow');
  btn.textContent = followMode ? 'Following' : 'Follow';
  btn.classList.toggle('active', followMode);
  if (followMode !== wasOn) { if (followMode) playStartSound(); else playStopSound(); }
  if (followMode && userLatLng) {
    isProgrammaticMove = true;
    map.setView([userLatLng.lat, userLatLng.lng], 17, { animate: false });
    isProgrammaticMove = false;
  }
}

document.getElementById('btn-follow').addEventListener('click', () => setFollowMode(!followMode));

map.on('dragstart', () => { if (followMode && !isProgrammaticMove) setFollowMode(false); });
map.on('zoomend', () => {
  if (followMode && !isProgrammaticMove && userLatLng) {
    isProgrammaticMove = true;
    map.panTo([userLatLng.lat, userLatLng.lng], { animate: false });
    isProgrammaticMove = false;
  }
});

function updateStatusLine() {
  const el = document.getElementById('status-line');
  if (trackingOn && userAccuracy !== null) {
    el.textContent = `±${Math.round(userAccuracy)} meters`;
  } else {
    const count = activeHexagons().size;
    el.textContent = `${count} hexagon${count !== 1 ? 's' : ''}`;
  }
}

function exitSelectMode(discard) {
  if (!selectMode) return;
  selectMode = false;
  const btn = document.getElementById('btn-select');
  btn.textContent = 'Select';
  btn.classList.remove('done-btn');
  document.getElementById('map').classList.remove('select-active');
  document.getElementById('btn-cancel-select').classList.remove('visible');
  if (!discard) {
    const newHexes = [];
    for (const key of draftHexagons) { if (!revealedHexagons.has(key)) newHexes.push(key); }
    revealedHexagons = new Set(draftHexagons);
    draftHexagons = null;
    reconcilePlacesWithRevealedHexagons();
    for (const key of newHexes) addHexToPlaces(key);
    saveAll();
    checkMilestone(revealedHexagons.size);
  } else {
    draftHexagons = null;
  }
  redrawFog();
  updateStatusLine();
  updateExportButton();
}

document.getElementById('btn-menu').addEventListener('click', () => {
  playOpenSound();
  document.getElementById('menu-overlay').classList.add('open');
});

document.getElementById('btn-location').addEventListener('click', () => {
  if (!trackingOn) {
    if (!navigator.geolocation) { alert('Geolocation not supported.'); return; }
    playOpenSound();
    startTracking();
  } else {
    playCloseSound();
    stopTracking();
  }
});

document.getElementById('btn-select').addEventListener('click', () => {
  if (!selectMode) {
    selectMode = true;
    draftHexagons = new Set(revealedHexagons);
    const btn = document.getElementById('btn-select');
    btn.textContent = 'Done';
    btn.classList.add('done-btn');
    document.getElementById('map').classList.add('select-active');
    document.getElementById('btn-cancel-select').classList.add('visible');
    playOpenSound();
    redrawFog();
    updateStatusLine();
  } else {
    playCloseSound();
    exitSelectMode(false);
  }
});

document.getElementById('btn-cancel-select').addEventListener('click', () => {
  if (!selectMode) return;
  playCloseSound();
  exitSelectMode(true);
});

function closeAllMenus() {
  playCloseSound();
  document.getElementById('menu-overlay').classList.remove('open', 'settings-open', 'places-open');
  applyTheme(currentThemeName);
}

function closeMenu() {
  playCloseSound();
  document.getElementById('menu-overlay').classList.remove('open', 'settings-open', 'places-open');
  applyTheme(currentThemeName);
}

function openSettings() {
  playOpenSound();
  document.getElementById('menu-overlay').classList.remove('places-open');
  document.getElementById('menu-overlay').classList.add('settings-open');
}

function closeSettings() {
  playCloseSound();
  document.getElementById('menu-overlay').classList.remove('settings-open');
}

function openPlaces() {
  playOpenSound();
  document.getElementById('menu-overlay').classList.remove('settings-open');
  document.getElementById('menu-overlay').classList.add('places-open');
}

function closePlaces() {
  playCloseSound();
  document.getElementById('menu-overlay').classList.remove('places-open');
}

document.getElementById('menu-backdrop').addEventListener('click', closeAllMenus);
document.getElementById('menu-back').addEventListener('click', closeMenu);
document.getElementById('menu-settings-open').addEventListener('click', openSettings);
document.getElementById('settings-back').addEventListener('click', closeSettings);
document.getElementById('menu-places-open').addEventListener('click', openPlaces);
document.getElementById('places-back').addEventListener('click', closePlaces);

document.getElementById('menu-save').addEventListener('click', () => {
  const blob = new Blob([buildSaveObject()], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const link = Object.assign(document.createElement('a'), {
    href: url,
    download: `hexplore-${new Date().toISOString().slice(0, 10)}.json`,
  });
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
  document.getElementById('menu-overlay').classList.remove('open', 'settings-open', 'places-open');
});

document.getElementById('menu-load').addEventListener('click', () => {
  playOpenSound();
  stopTracking();
  const fileInput = Object.assign(document.createElement('input'), {
    type: 'file', accept: '.json,application/json',
  });
  let resolved = false;
  fileInput.addEventListener('cancel', () => { if (resolved) return; resolved = true; playCloseSound(); });
  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) { if (!resolved) { resolved = true; playCloseSound(); } return; }
    resolved = true;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (!data || typeof data !== 'object') throw new Error('invalid');
        if (selectMode) exitSelectMode(true);
        placesData = new Map();
        revealedHexagons = new Set();
        for (const [pkey, val] of Object.entries(data)) {
          if (!val || typeof val !== 'object' || !Array.isArray(val.hexagons)) continue;
          const hexSet = new Set(val.hexagons);
          const coords = pkey === NO_LOCATION_KEY ? [null, null] : pkey.split(',').map(Number);
          placesData.set(pkey, { name: val.name ?? null, lat: coords[0], lng: coords[1], hexagons: hexSet });
          for (const key of hexSet) revealedHexagons.add(key);
        }
        saveAll();
        resetMilestoneBaseline(revealedHexagons.size);
        updateExportButton();
        snapToRandomRevealedHexagon();
        redrawFog();
        updateStatusLine();
        renderPlacesList();
        closeMenu();
      } catch {
        playCloseSound();
        alert('Invalid file.');
      }
    };
    reader.readAsText(file);
  });
  fileInput.click();
});

document.getElementById('menu-clear').addEventListener('click', () => {
  playOpenSound();
  document.getElementById('confirm-overlay').classList.add('open');
});

document.getElementById('confirm-overlay').addEventListener('click', (e) => {
  if (e.target.id === 'confirm-overlay') { playCloseSound(); document.getElementById('confirm-overlay').classList.remove('open'); }
});
document.getElementById('confirm-cancel').addEventListener('click', () => {
  playCloseSound();
  document.getElementById('confirm-overlay').classList.remove('open');
});

document.getElementById('confirm-ok').addEventListener('click', () => {
  stopTracking();
  if (selectMode) exitSelectMode(true);

  revealedHexagons.clear();
  placesData.clear();
  saveAll();
  resetMilestoneBaseline(0);
  renderPlacesList();

  soundOn = true;
  try { localStorage.setItem(SOUND_KEY, 'true'); } catch (e) {}
  soundBtn.textContent = 'Sound: On';

  milestoneStep = 500;
  try { localStorage.setItem(MILESTONE_STEP_KEY, '500'); } catch (e) {}
  milestoneBtn.textContent = 'Notify every: 500';

  placesThreshold = 100;
  try { localStorage.setItem(DISCOVERY_STEP_KEY, '100'); } catch (e) {}
  discoveryBtn.textContent = 'Minimum discovery: 100';

  mistOn = false;
  try { localStorage.setItem(MIST_KEY, 'false'); } catch (e) {}
  mistBtn.textContent = 'Mist: Off';

  currentThemeName = 'default';
  try { localStorage.setItem(THEME_KEY, 'default'); } catch (e) {}
  applyTheme('default');
  themeBtn.textContent = 'Theme: Default';

  map.setView([20, 0], 3, { animate: false });
  redrawFog();
  updateStatusLine();
  updateExportButton();
  playCloseSound();
  document.getElementById('confirm-overlay').classList.remove('open');
  document.getElementById('menu-overlay').classList.remove('open', 'settings-open', 'places-open');
});

const soundBtn = document.getElementById('menu-sound');
soundBtn.textContent = `Sound: ${soundOn ? 'On' : 'Off'}`;
soundBtn.addEventListener('click', () => {
  const turningOn = !soundOn;
  if (turningOn) { soundOn = true; playStartSound(); }
  else { playStopSound(); soundOn = false; }
  try { localStorage.setItem(SOUND_KEY, String(soundOn)); } catch (e) {}
  soundBtn.textContent = `Sound: ${soundOn ? 'On' : 'Off'}`;
});

const mistBtn = document.getElementById('menu-mist');
mistBtn.textContent = `Mist: ${mistOn ? 'On' : 'Off'}`;
mistBtn.addEventListener('click', () => {
  mistOn = !mistOn;
  try { localStorage.setItem(MIST_KEY, String(mistOn)); } catch (e) {}
  mistBtn.textContent = `Mist: ${mistOn ? 'On' : 'Off'}`;
  if (mistOn) playStartSound(); else playStopSound();
  redrawFog();
});

const discoveryBtn = document.getElementById('menu-discovery');
discoveryBtn.textContent = `Minimum discovery: ${placesThreshold}`;
discoveryBtn.addEventListener('click', () => {
  const idx = DISCOVERY_STEPS.indexOf(placesThreshold);
  placesThreshold = DISCOVERY_STEPS[(idx + 1) % DISCOVERY_STEPS.length];
  try { localStorage.setItem(DISCOVERY_STEP_KEY, String(placesThreshold)); } catch (e) {}
  discoveryBtn.textContent = `Minimum discovery: ${placesThreshold}`;
  renderPlacesList();
  playStartSound();
});

const milestoneBtn = document.getElementById('menu-milestone');
milestoneBtn.textContent = `Notify every: ${milestoneStep}`;
milestoneBtn.addEventListener('click', () => {
  const idx = MILESTONE_STEPS.indexOf(milestoneStep);
  milestoneStep = MILESTONE_STEPS[(idx + 1) % MILESTONE_STEPS.length];
  try { localStorage.setItem(MILESTONE_STEP_KEY, String(milestoneStep)); } catch (e) {}
  milestoneBtn.textContent = `Notify every: ${milestoneStep}`;
  resetMilestoneBaseline(revealedHexagons.size);
  if (milestoneStep === 'Off') playStopSound(); else playStartSound();
});

const themeBtn = document.getElementById('menu-theme');
themeBtn.textContent = `Theme: ${THEMES[currentThemeName].name}`;
themeBtn.addEventListener('click', () => {
  const idx = THEME_ORDER.indexOf(currentThemeName);
  const nextName = THEME_ORDER[(idx + 1) % THEME_ORDER.length];
  applyTheme(nextName);
  try { localStorage.setItem(THEME_KEY, nextName); } catch (e) {}
  themeBtn.textContent = `Theme: ${THEMES[nextName].name}`;
  playStartSound();
});

loadCities();
applyTheme(currentThemeName);

renderPlacesList();
updateExportButton();
updatePlacesButton();
syncLayout(true);
window.addEventListener('resize', () => syncLayout(true));
window.addEventListener('orientationchange', () => {
  syncLayout(true);
  setTimeout(() => syncLayout(true), 50);
  setTimeout(() => { syncLayout(true); applyTheme(currentThemeName); }, 300);
});
updateStatusLine();
</script>
</body>
</html>
