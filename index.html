<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Exploration</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: #101010; font-family: -apple-system, 'SF Pro Display', sans-serif; color: #E0E0E0; overflow: hidden; }

#map { position: absolute; top: 0; left: 0; right: 0; bottom: 148px; }
#fog-canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 400; }

.leaflet-control-zoom { display: none !important; }
.leaflet-control-attribution { font-size: 9px !important; opacity: 0.35; }

/* HUD */
#hud {
  position: absolute; top: 14px; left: 14px; z-index: 500;
  background: rgba(16,16,16,0.88); backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.10); border-radius: 12px;
  padding: 10px 14px; display: flex; gap: 14px; align-items: flex-start;
}
.stat { display: flex; flex-direction: column; align-items: center; gap: 2px; min-width: 44px; }
.stat-lbl { font-size: 10px; color: #808090; letter-spacing: 0.02em; }
.stat-val { font-size: 15px; font-weight: 700; color: #E0E0E0; }
.stat-val.good { color: #00E080; }
.stat-val.warn { color: #F0A000; }
.stat-val.bad  { color: #E03020; }

/* Follow button */
#follow-btn {
  position: absolute; top: 14px; right: 14px; z-index: 500;
  background: rgba(16,16,16,0.88); backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.20); border-radius: 10px;
  padding: 9px 16px; font-size: 13px; font-weight: 600; color: #C0C0C0;
  cursor: pointer; display: none;
}
#follow-btn.active { border-color: #00A0E0; color: #00A0E0; background: rgba(0,160,224,0.10); }

/* Bottom bar */
#bottom {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 500;
  background: #101010; border-top: 1px solid rgba(255,255,255,0.08);
  padding: 12px 14px 30px; display: flex; flex-direction: column; gap: 8px;
}
#main-btn {
  width: 100%; padding: 17px; border: none; border-radius: 10px;
  font-size: 16px; font-weight: 700; cursor: pointer;
  background: #00A0E0; color: #101010; transition: background 0.15s, opacity 0.15s;
}
#main-btn.tracking { background: #E03020; color: #F0F0F0; }
#main-btn:disabled { opacity: 0.35; cursor: default; }

#sec-row { display: flex; gap: 8px; }
.sec-btn {
  flex: 1; padding: 13px 0; background: #1A1A1A;
  border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
  font-size: 14px; font-weight: 600; color: #A0A0B0; cursor: pointer;
  transition: all 0.15s; text-align: center;
}
.sec-btn:disabled { opacity: 0.30; cursor: default; }
.sec-btn.active { background: rgba(0,160,224,0.12); border-color: #00A0E0; color: #00A0E0; }

/* Menu overlay */
#menu-overlay {
  position: absolute; inset: 0; z-index: 600;
  background: rgba(10,10,10,0.72); backdrop-filter: blur(8px);
  display: none; align-items: flex-end; justify-content: center;
}
#menu-overlay.open { display: flex; }
#menu-panel {
  width: 100%; background: #181818;
  border-top: 1px solid rgba(255,255,255,0.10);
  border-radius: 20px 20px 0 0;
  padding: 18px 16px 40px;
  display: flex; flex-direction: column; gap: 10px;
}
.menu-btn {
  width: 100%; padding: 16px; border: none; border-radius: 10px;
  font-size: 15px; font-weight: 600; cursor: pointer;
  background: #222; color: #D0D0D0; text-align: center; transition: background 0.12s;
}
.menu-btn.danger { color: #E03020; }
.menu-btn.back   { background: #00A0E0; color: #101010; }

/* Edit mode overlay markers handled via Leaflet */
#map.drawing { cursor: crosshair; }
#map.editing  { cursor: pointer; }
</style>
</head>
<body>

<div id="map"></div>
<canvas id="fog-canvas"></canvas>

<div id="hud">
  <div class="stat">
    <span class="stat-lbl">Distance</span>
    <span class="stat-val" id="s-dist">0 m</span>
  </div>
  <div class="stat">
    <span class="stat-lbl">Area</span>
    <span class="stat-val" id="s-area">0 m²</span>
  </div>
  <div class="stat" id="s-acc-wrap" style="display:none">
    <span class="stat-lbl">Accuracy</span>
    <span class="stat-val" id="s-acc">—</span>
  </div>
</div>

<button id="follow-btn" onclick="toggleFollow()">Follow</button>

<div id="bottom">
  <button id="main-btn" onclick="toggleTracking()">Use location</button>
  <div id="sec-row">
    <button class="sec-btn" id="menu-btn" onclick="menuBtnAction()">Menu</button>
    <button class="sec-btn" id="draw-btn" onclick="drawBtnAction()">Draw path</button>
  </div>
</div>

<div id="menu-overlay" onclick="onOverlayClick(event)">
  <div id="menu-panel">
    <button class="menu-btn back"   onclick="closeMenu()">Back</button>
    <button class="menu-btn"        onclick="menuSave()">Save</button>
    <label  class="menu-btn"       >Load<input type="file" accept=".json" onchange="menuLoad(event)" style="display:none"></label>
    <button class="menu-btn"        onclick="startEdit()">Edit</button>
    <button class="menu-btn" id="units-btn" onclick="toggleUnits()">Imperial units</button>
    <button class="menu-btn danger" onclick="menuClear()">Clear data</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ── constants ─────────────────────────────────────────────────────────────────
const INNER_R_M      = 100;   // fully clear radius
const MID_R_M        = 300;   // semi-clear out to here
const FOG_OUTER      = 0.93;  // nearly opaque beyond 300m
const FOG_MID        = 0.50;  // 50% between 100-300m
const MIN_DIST_M     = 8;     // min movement to record GPS point
const MAX_ACCURACY_M = 100;   // reject GPS fixes worse than this
const MAX_GAP_M      = 200;   // gap beyond which a new island is started
const STORAGE_KEY    = 'exploration_v2';

// ── state ─────────────────────────────────────────────────────────────────────
// segments: Array of Array<{lat,lng}>  — each is an independent island
// drawSegment: vertices of path being drawn (not yet committed)
// editMarkers: Leaflet markers shown in edit mode, one per point

let segments     = [];
let activeSegIdx = null;  // which segment GPS is currently appending to
let currentPos   = null;
let tracking     = false;
let watchId      = null;
let followMe     = false;
let metric       = true;
let totalDist    = 0;

// draw mode
let drawMode     = false;
let drawSegment  = [];
let drawMarkers  = [];
let drawPolyline = null;

// edit mode
let editMode     = false;
let editMarkers  = [];  // [{marker, segIdx, ptIdx}]

// position marker
let posMarker    = null;

// ── persist ───────────────────────────────────────────────────────────────────
(function init() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      if (d.segments) segments = d.segments;
      if (d.metric !== undefined) metric = d.metric;
      totalDist = computeTotalDist();
    }
  } catch(e) {}
})();

function saveStorage() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ segments, metric })); } catch(e) {}
}

// ── map ───────────────────────────────────────────────────────────────────────
const map = L.map('map', { center: [40,-20], zoom: 3, zoomControl: false, attributionControl: true });
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png',   { maxZoom: 19 }).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', { maxZoom: 19, pane: 'shadowPane' }).addTo(map);

map.on('dragstart', () => { if (!drawMode && !editMode) setFollow(false); });
map.on('move zoom resize viewreset', redrawFog);
map.on('click', onMapClick);

// ── canvas ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('fog-canvas');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
  const r = document.getElementById('map').getBoundingClientRect();
  canvas.width = r.width; canvas.height = r.height;
  canvas.style.cssText = `position:absolute;top:${r.top}px;left:${r.left}px;` +
    `width:${r.width}px;height:${r.height}px;pointer-events:none;z-index:400`;
}

// ── fog ───────────────────────────────────────────────────────────────────────
function metersToPixels(lat, m) {
  const p1 = map.latLngToContainerPoint([lat, 0]);
  const p2 = map.latLngToContainerPoint([lat + m / 111320, 0]);
  return Math.abs(p2.y - p1.y);
}

function buildMask(w, h, radiusM) {
  const c = new OffscreenCanvas(w, h);
  const x = c.getContext('2d');
  x.fillStyle = x.strokeStyle = 'rgba(0,0,0,1)';
  x.lineJoin = 'round'; x.lineCap = 'round';

  // All committed segments + current GPS position (as its own single-point island)
  const segs = currentPos ? [...segments, [currentPos]] : segments;

  for (const seg of segs) {
    if (!seg.length) continue;
    const r = metersToPixels(seg[0].lat, radiusM);
    x.lineWidth = r * 2;
    const p0 = map.latLngToContainerPoint([seg[0].lat, seg[0].lng]);
    x.beginPath(); x.arc(p0.x, p0.y, r, 0, Math.PI*2); x.fill();
    for (let i = 1; i < seg.length; i++) {
      const pa = map.latLngToContainerPoint([seg[i-1].lat, seg[i-1].lng]);
      const pb = map.latLngToContainerPoint([seg[i].lat,   seg[i].lng]);
      x.beginPath(); x.moveTo(pa.x, pa.y); x.lineTo(pb.x, pb.y); x.stroke();
      x.beginPath(); x.arc(pb.x, pb.y, r, 0, Math.PI*2); x.fill();
    }
  }
  return c;
}

function redrawFog() {
  resizeCanvas();
  const w = canvas.width, h = canvas.height;
  const f = new OffscreenCanvas(w, h);
  const fc = f.getContext('2d');

  // Outer fog
  fc.fillStyle = `rgba(14,14,14,${FOG_OUTER})`;
  fc.fillRect(0, 0, w, h);

  const segs = currentPos ? [...segments, [currentPos]] : segments;
  if (!segs.some(s => s.length > 0)) { ctx.clearRect(0,0,w,h); ctx.drawImage(f,0,0); return; }

  const midMask   = buildMask(w, h, MID_R_M);
  const innerMask = buildMask(w, h, INNER_R_M);

  // Mid-fog layer clipped to midMask
  const midLayer = new OffscreenCanvas(w, h);
  const mc = midLayer.getContext('2d');
  mc.drawImage(midMask, 0, 0);
  mc.globalCompositeOperation = 'source-in';
  mc.fillStyle = `rgba(14,14,14,${FOG_MID})`;
  mc.fillRect(0, 0, w, h);

  // Replace outer with mid in mid zone
  fc.globalCompositeOperation = 'destination-out';
  fc.drawImage(midMask, 0, 0);
  fc.globalCompositeOperation = 'source-over';
  fc.drawImage(midLayer, 0, 0);

  // Punch inner fully clear
  fc.globalCompositeOperation = 'destination-out';
  fc.drawImage(innerMask, 0, 0);

  ctx.clearRect(0, 0, w, h);
  ctx.drawImage(f, 0, 0);
}

// ── GPS tracking ──────────────────────────────────────────────────────────────
function toggleTracking() {
  tracking ? stopTracking() : startTracking();
}

function startTracking() {
  if (!navigator.geolocation) return;
  tracking = true;
  activeSegIdx = null;
  setFollow(true);
  updateUI();
  watchId = navigator.geolocation.watchPosition(onPosition, onGpsError,
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 });
}

function stopTracking() {
  if (watchId != null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  tracking = false;
  activeSegIdx = null;
  // Do NOT clear currentPos from the map immediately — just stop updating
  currentPos = null;
  if (posMarker) { map.removeLayer(posMarker); posMarker = null; }
  document.getElementById('s-acc-wrap').style.display = 'none';
  document.getElementById('follow-btn').style.display = 'none';
  saveStorage();
  updateUI();
  redrawFog();
}

function onPosition(pos) {
  const { latitude: lat, longitude: lng, accuracy: acc } = pos.coords;

  // Update accuracy display regardless
  const accEl = document.getElementById('s-acc');
  const accM  = Math.round(acc);
  accEl.textContent = metric ? `±${accM} m` : `±${Math.round(acc*3.281)} ft`;
  accEl.className = 'stat-val ' + (acc < 50 ? 'good' : acc < 100 ? 'warn' : 'bad');
  document.getElementById('s-acc-wrap').style.display = 'flex';

  // Always show blue dot at estimated position
  updatePosMarker(lat, lng);
  if (followMe) map.setView([lat, lng], Math.max(map.getZoom(), 16), { animate: true, duration: 0.5 });

  // Only reveal map if accuracy is good enough
  if (acc >= MAX_ACCURACY_M) return;

  // Island logic: if no active segment, or gap is too large, start a new island
  if (activeSegIdx === null) {
    segments.push([{ lat, lng }]);
    activeSegIdx = segments.length - 1;
  } else {
    const seg  = segments[activeSegIdx];
    const last = seg[seg.length - 1];
    const d    = haversine(last.lat, last.lng, lat, lng);
    if (d < MIN_DIST_M) return;
    if (d >= MAX_GAP_M) {
      // Large gap — start a new island rather than connecting
      segments.push([{ lat, lng }]);
      activeSegIdx = segments.length - 1;
    } else {
      totalDist += d;
      seg.push({ lat, lng });
    }
  }

  saveStorage();
  updateStats();
  redrawFog();
}

function onGpsError() { stopTracking(); }

function updatePosMarker(lat, lng) {
  const icon = L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;border-radius:50%;background:#00A0E0;border:3px solid #F0F0F0;box-shadow:0 0 0 4px rgba(0,160,224,0.25)"></div>`,
    iconAnchor: [7,7],
  });
  if (posMarker) posMarker.setLatLng([lat, lng]);
  else posMarker = L.marker([lat, lng], { icon, zIndexOffset: 1000 }).addTo(map);
}

// ── draw path mode ────────────────────────────────────────────────────────────
function drawBtnAction() {
  if (drawMode)      doneDraw();
  else if (editMode) doneEdit();
  else               startDraw();
}

function menuBtnAction() {
  if (drawMode)      undoDraw();
  else if (editMode) undoEdit();
  else               openMenu();
}

function startDraw() {
  drawMode = true;
  drawSegment = [];
  document.getElementById('map').classList.add('drawing');
  updateUI();
}

function doneDraw() {
  // Commit drawn segment as a new independent island (no connection to existing trail)
  if (drawSegment.length > 0) {
    const pts = [drawSegment[0]];
    for (let i = 1; i < drawSegment.length; i++) {
      pts.push(...interpolate(drawSegment[i-1], drawSegment[i], 30));
    }
    segments.push(pts);
    totalDist += segmentLength(pts);
    saveStorage();
    updateStats();
  }
  endDraw();
  redrawFog();
}

function undoDraw() {
  if (drawSegment.length === 0) { endDraw(); return; }
  drawSegment.pop();
  const m = drawMarkers.pop();
  if (m) map.removeLayer(m);
  if (drawPolyline) { map.removeLayer(drawPolyline); drawPolyline = null; }
  if (drawSegment.length > 1) {
    drawPolyline = L.polyline(drawSegment.map(p => [p.lat, p.lng]),
      { color: '#00A0E0', weight: 2, opacity: 0.7, dashArray: '6 4' }).addTo(map);
  }
  if (drawSegment.length === 0) endDraw();
}

function endDraw() {
  drawMode = false;
  drawMarkers.forEach(m => map.removeLayer(m)); drawMarkers = [];
  if (drawPolyline) { map.removeLayer(drawPolyline); drawPolyline = null; }
  drawSegment = [];
  document.getElementById('map').classList.remove('drawing');
  updateUI();
}

// ── edit mode ─────────────────────────────────────────────────────────────────
function startEdit() {
  closeMenu();
  // Stop location if on
  if (tracking) stopTracking();
  editMode = true;
  document.getElementById('map').classList.add('editing');
  showEditMarkers();
  updateUI();
}

function showEditMarkers() {
  clearEditMarkers();
  segments.forEach((seg, si) => {
    seg.forEach((pt, pi) => {
      const icon = L.divIcon({
        className: '',
        html: `<div style="width:22px;height:22px;border-radius:50%;background:#00A0E0;border:3px solid #F0F0F0;box-shadow:0 0 8px rgba(0,160,224,0.6);cursor:pointer"></div>`,
        iconAnchor: [11,11],
      });
      const marker = L.marker([pt.lat, pt.lng], { icon, zIndexOffset: 900 }).addTo(map);
      marker.on('click', (e) => {
        L.DomEvent.stopPropagation(e);
        removePoint(si, pi);
      });
      editMarkers.push({ marker, segIdx: si, ptIdx: pi });
    });
  });
}

function clearEditMarkers() {
  editMarkers.forEach(e => map.removeLayer(e.marker));
  editMarkers = [];
}

function removePoint(segIdx, ptIdx) {
  const seg = segments[segIdx];
  if (!seg) return;

  // Split segment at this point — removing the point and any segments connected to it.
  // Points before it form one sub-segment, points after form another.
  const before = seg.slice(0, ptIdx);
  const after  = seg.slice(ptIdx + 1);

  const newSegs = [];
  if (before.length > 0) newSegs.push(before);
  if (after.length  > 0) newSegs.push(after);

  segments.splice(segIdx, 1, ...newSegs);

  // Recompute distance from scratch
  totalDist = computeTotalDist();
  saveStorage();
  updateStats();

  // Rebuild all edit markers (indices changed)
  showEditMarkers();
  redrawFog();
}

function undoEdit() {
  // Undo not tracked point-by-point here; treat as done
  doneEdit();
}

function doneEdit() {
  editMode = false;
  clearEditMarkers();
  document.getElementById('map').classList.remove('editing');
  updateUI();
  redrawFog();
}

// ── map click ─────────────────────────────────────────────────────────────────
function onMapClick(e) {
  if (!drawMode) return;
  const pt = { lat: e.latlng.lat, lng: e.latlng.lng };
  drawSegment.push(pt);

  const icon = L.divIcon({
    className: '',
    html: `<div style="width:18px;height:18px;border-radius:50%;background:#00A0E0;border:3px solid #F0F0F0;box-shadow:0 0 8px rgba(0,160,224,0.5)"></div>`,
    iconAnchor: [9,9],
  });
  drawMarkers.push(L.marker([pt.lat, pt.lng], { icon }).addTo(map));

  if (drawPolyline) map.removeLayer(drawPolyline);
  if (drawSegment.length > 1) {
    drawPolyline = L.polyline(drawSegment.map(p => [p.lat, p.lng]),
      { color: '#00A0E0', weight: 2, opacity: 0.7, dashArray: '6 4' }).addTo(map);
  }
}

// ── menu ──────────────────────────────────────────────────────────────────────
function openMenu() {
  document.getElementById('units-btn').textContent = metric ? 'Imperial units' : 'Metric units';
  document.getElementById('menu-overlay').classList.add('open');
}
function closeMenu() {
  document.getElementById('menu-overlay').classList.remove('open');
}
function onOverlayClick(e) {
  if (e.target === document.getElementById('menu-overlay')) closeMenu();
}
function menuSave() {
  closeMenu();
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([JSON.stringify({ version: 5, segments })], { type: 'application/json' })),
    download: 'exploration-data.json',
  });
  a.click();
}
function menuLoad(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      segments  = d.segments || (d.trail ? [d.trail] : []);
      totalDist = computeTotalDist();
      updateStats(); saveStorage();
      const last = segments.flatMap(s=>s).pop();
      if (last) map.setView([last.lat, last.lng], 12);
      redrawFog();
    } catch(err) {}
  };
  reader.readAsText(file);
  e.target.value = '';
  closeMenu();
}
function toggleUnits() {
  metric = !metric;
  document.getElementById('units-btn').textContent = metric ? 'Imperial units' : 'Metric units';
  saveStorage();
  updateStats();
  // Do NOT close menu (step 9)
}
function menuClear() {
  if (!confirm('Clear all data?')) return;
  if (tracking) stopTracking();
  if (drawMode) endDraw();
  if (editMode) doneEdit();
  segments = []; totalDist = 0; currentPos = null;
  saveStorage(); updateStats(); redrawFog();
  closeMenu();
}

// ── follow ────────────────────────────────────────────────────────────────────
function setFollow(val) {
  followMe = val;
  const btn = document.getElementById('follow-btn');
  btn.textContent = val ? 'Following' : 'Follow';
  btn.className   = val ? 'active' : '';
}
function toggleFollow() { setFollow(!followMe); }

// ── UI ────────────────────────────────────────────────────────────────────────
function updateUI() {
  const mainBtn = document.getElementById('main-btn');
  const menuBtn = document.getElementById('menu-btn');
  const drawBtn = document.getElementById('draw-btn');
  const followBtn = document.getElementById('follow-btn');

  if (editMode) {
    // Location off and grayed, menu replaced by Undo, draw replaced by Done
    mainBtn.disabled = true;
    mainBtn.textContent = 'Use location';
    mainBtn.className = '';
    menuBtn.textContent = 'Undo';
    drawBtn.textContent = 'Done';
    drawBtn.classList.add('active');
    followBtn.style.display = 'none';
  } else if (drawMode) {
    // Location still accessible, menu → Undo, draw → Done
    mainBtn.disabled = false;
    mainBtn.textContent = tracking ? 'Stop tracking' : 'Use location';
    mainBtn.className = tracking ? 'tracking' : '';
    menuBtn.textContent = 'Undo';
    drawBtn.textContent = 'Done';
    drawBtn.classList.add('active');
    followBtn.style.display = tracking ? 'block' : 'none';
  } else {
    mainBtn.disabled = false;
    mainBtn.textContent = tracking ? 'Stop tracking' : 'Use location';
    mainBtn.className = tracking ? 'tracking' : '';
    menuBtn.textContent = 'Menu';
    drawBtn.textContent = 'Draw path';
    drawBtn.classList.remove('active');
    followBtn.style.display = tracking ? 'block' : 'none';
  }
}

// ── stats ─────────────────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('s-dist').textContent = fmtDist(totalDist);
  document.getElementById('s-area').textContent = fmtArea(computeArea());
}

function computeTotalDist() {
  return segments.reduce((s, seg) => s + segmentLength(seg), 0);
}

function segmentLength(seg) {
  let d = 0;
  for (let i = 1; i < seg.length; i++) d += haversine(seg[i-1].lat, seg[i-1].lng, seg[i].lat, seg[i].lng);
  return d;
}

function computeArea() {
  // Corridor area: each segment contributes length × 2r + circle at each end.
  // For isolated points (length=0) it's just π r².
  // This approximates the fully revealed (inner) corridor area.
  const r = INNER_R_M;
  let area = 0;
  for (const seg of segments) {
    if (seg.length === 0) continue;
    area += Math.PI * r * r; // start cap
    for (let i = 1; i < seg.length; i++) {
      const d = haversine(seg[i-1].lat, seg[i-1].lng, seg[i].lat, seg[i].lng);
      area += d * 2 * r;      // corridor strip
      area += Math.PI * r * r; // end cap per point (slight overcount but acceptable)
    }
  }
  return area;
}

function fmtDist(m) {
  if (metric) return m >= 1000 ? `${(m/1000).toFixed(2)} km` : `${Math.round(m)} m`;
  const ft = m * 3.281;
  return ft >= 5280 ? `${(ft/5280).toFixed(2)} mi` : `${Math.round(ft)} ft`;
}

function fmtArea(sqm) {
  if (metric) {
    if (sqm >= 1e6)  return `${(sqm/1e6).toFixed(2)} km²`;
    if (sqm >= 1e4)  return `${(sqm/1e4).toFixed(1)} ha`;
    return `${Math.round(sqm)} m²`;
  }
  const sqft = sqm * 10.764;
  if (sqft >= 27878400) return `${(sqft/27878400).toFixed(2)} mi²`;
  if (sqft >= 43560)    return `${(sqft/43560).toFixed(1)} ac`;
  return `${Math.round(sqft)} ft²`;
}

// ── helpers ───────────────────────────────────────────────────────────────────
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000, dL = (lat2-lat1)*Math.PI/180, dG = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dL/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dG/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function interpolate(a, b, stepM) {
  const total = haversine(a.lat, a.lng, b.lat, b.lng);
  const steps = Math.max(1, Math.floor(total / stepM));
  const pts = [];
  for (let i = 1; i <= steps; i++) {
    const t = i / steps;
    pts.push({ lat: a.lat + (b.lat-a.lat)*t, lng: a.lng + (b.lng-a.lng)*t });
  }
  return pts;
}

// ── init ──────────────────────────────────────────────────────────────────────
updateUI();
updateStats();
window.addEventListener('resize', redrawFog);
setTimeout(redrawFog, 400);
</script>
