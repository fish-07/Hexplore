<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Explore</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  height: 100%; background: #101010;
  font-family: -apple-system, 'SF Pro Display', sans-serif;
  color: #E0E0E0; overflow: hidden;
  /* Portrait orientation lock via CSS */
}

/* Portrait lock: rotate content when in landscape */
@media screen and (orientation: landscape) {
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 9999;
    background: #101010;
  }
  body::after {
    content: 'Please rotate to portrait';
    position: fixed; inset: 0; z-index: 10000;
    display: flex; align-items: center; justify-content: center;
    color: #606070; font-size: 16px; font-weight: 600;
    /* CSS doesn't allow display:flex on ::after by default in all browsers,
       so we use a real element approach via JS below instead */
  }
}

#map { position: absolute; top: 0; left: 0; right: 0; bottom: 148px; }
#fog-canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 400; }

.leaflet-control-zoom { display: none !important; }
.leaflet-control-attribution { font-size: 9px !important; opacity: 0.35; }

/* HUD */
#hud {
  position: absolute; top: 14px; left: 14px; z-index: 600;
  background: rgba(16,16,16,1); 
  border: 1px solid rgba(255,255,255,0.10); border-radius: 12px;
  padding: 10px 14px; display: flex; gap: 14px; align-items: flex-start;
}
.stat { display: flex; flex-direction: column; align-items: center; gap: 2px; min-width: 44px; }
.stat-lbl { font-size: 10px; color: #808090; letter-spacing: 0.02em; }
.stat-val { font-size: 15px; font-weight: 700; color: #E0E0E0; }
.stat-val.good { color: #00E080; }
.stat-val.warn { color: #F0A000; }
.stat-val.bad  { color: #E03020; }

/* Follow button — opaque, always looks tappable */
#follow-btn {
  position: absolute; top: 14px; right: 14px; z-index: 600;
  background: #1A1A1A;
  border: 1px solid rgba(255,255,255,0.20); border-radius: 10px;
  padding: 9px 16px; font-size: 13px; font-weight: 600; color: #F0F0F0;
  cursor: pointer; display: none;
}
#follow-btn.active {
  border-color: #00A0E0; color: #00A0E0; background: #00A0E0;
  color: #F0F0F0;
}

/* Bottom bar */
#bottom {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 600;
  background: #101010; border-top: 1px solid rgba(255,255,255,0.08);
  padding: 12px 14px 30px; display: flex; flex-direction: column; gap: 8px;
}
#main-btn {
  width: 100%; padding: 17px; border: none; border-radius: 10px;
  font-size: 16px; font-weight: 700; cursor: pointer;
  background: #00A0E0; color: #F0F0F0; transition: background 0.15s, opacity 0.15s;
}
#main-btn.tracking { background: #E03020; color: #F0F0F0; }
#main-btn:disabled { opacity: 0.35; cursor: default; }

#sec-row { display: flex; gap: 8px; }
.sec-btn {
  flex: 1; padding: 13px 0; background: #1A1A1A;
  border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
  font-size: 14px; font-weight: 600; color: #A0A0B0; cursor: pointer;
  transition: all 0.15s; text-align: center;
}
.sec-btn:disabled { opacity: 0.30; cursor: default; }
.sec-btn.active { background: #00A0E0; border-color: #00A0E0; color: #F0F0F0; }

/* Menu overlay */
#menu-overlay {
  position: absolute; inset: 0; z-index: 700;
  background: rgba(10,10,10,0.72); backdrop-filter: blur(8px);
  display: none; align-items: flex-end; justify-content: center;
}
#menu-overlay.open { display: flex; }
#menu-panel {
  width: 100%; background: #181818;
  border-top: 1px solid rgba(255,255,255,0.10);
  border-radius: 20px 20px 0 0;
  padding: 18px 16px 40px;
  display: flex; flex-direction: column; gap: 10px;
}
.menu-btn {
  width: 100%; padding: 16px; border: none; border-radius: 10px;
  font-size: 15px; font-weight: 600; cursor: pointer;
  background: #222; color: #D0D0D0; text-align: center; transition: background 0.12s;
}
.menu-btn.danger { color: #E03020; }
.menu-btn.back   { background: #00A0E0; color: #F0F0F0; }

#map.drawing { cursor: crosshair; }
#map.editing  { cursor: pointer; }

/* Portrait lock overlay */
#rotate-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 99999;
  background: #101010;
  align-items: center; justify-content: center;
  color: #606070; font-size: 16px; font-weight: 600;
}
</style>
</head>
<body>

<div id="rotate-overlay">Rotate to portrait</div>
<div id="map"></div>
<canvas id="fog-canvas"></canvas>

<div id="hud">
  <div class="stat">
    <span class="stat-lbl">Distance</span>
    <span class="stat-val" id="s-dist">0 m</span>
  </div>
  <div class="stat">
    <span class="stat-lbl">Area</span>
    <span class="stat-val" id="s-area">0 m²</span>
  </div>
  <div class="stat" id="s-acc-wrap" style="display:none">
    <span class="stat-lbl">Accuracy</span>
    <span class="stat-val" id="s-acc">—</span>
  </div>
</div>

<button id="follow-btn" onclick="toggleFollow()">Follow</button>

<div id="bottom">
  <button id="main-btn" onclick="toggleTracking()">Use location</button>
  <div id="sec-row">
    <button class="sec-btn" id="menu-btn" onclick="menuBtnAction()">Menu</button>
    <button class="sec-btn" id="draw-btn" onclick="drawBtnAction()">Draw path</button>
  </div>
</div>

<div id="menu-overlay" onclick="onOverlayClick(event)">
  <div id="menu-panel">
    <button class="menu-btn back" onclick="closeMenu()">Back</button>
    <button class="menu-btn"     onclick="startEdit()">Edit</button>
    <button class="menu-btn"     onclick="menuSave()">Save</button>
    <label  class="menu-btn"    >Load<input type="file" accept=".json" onchange="menuLoad(event)" style="display:none"></label>
    <button class="menu-btn" id="units-btn" onclick="toggleUnits()">Use imperial units</button>
    <button class="menu-btn danger" onclick="menuClear()">Clear data</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ── Portrait lock ─────────────────────────────────────────────────────────────
function checkOrientation() {
  const landscape = window.innerWidth > window.innerHeight;
  document.getElementById('rotate-overlay').style.display = landscape ? 'flex' : 'none';
}
window.addEventListener('resize', checkOrientation);
checkOrientation();

// ── Constants ─────────────────────────────────────────────────────────────────
const INNER_R_M      = 100;   // fully clear radius (m)
const MID_R_M        = 300;   // semi-transparent out to here (m)
const FOG_OUTER      = 0.90;  // opacity beyond MID_R_M
const FOG_MID        = 0.50;  // opacity between INNER and MID
const FOG_EDIT       = 0.50;  // flat fog opacity during draw/edit modes
const MIN_DIST_M     = 20;    // min GPS movement to record new point
const MAX_ACCURACY_M = 100;   // reject GPS fixes worse than this (m)
const MAX_GAP_M      = 200;   // gap above which GPS starts a new island
const STORAGE_KEY    = 'explore_v3';

// ── State ─────────────────────────────────────────────────────────────────────
let segments     = [];        // Array<Array<{lat,lng}>> — independent islands
let activeSegIdx = null;      // segment index GPS is appending to
let currentPos   = null;      // {lat,lng} of last known position (for blue dot)
let rawPos       = null;      // {lat,lng} updated on every GPS fix regardless of accuracy
let tracking     = false;
let watchId      = null;
let followMe     = false;
let metric       = true;
let totalDist    = 0;

// Draw mode
let drawMode     = false;
let drawSegment  = [];        // vertices placed this draw session
let drawMarkers  = [];
let drawPolyline = null;

// Edit mode
let editMode        = false;
let editMarkers     = [];     // [{marker, segIdx, ptIdx}]
let editUndoStack   = [];     // stack of removed points for undo: [{segIdx, ptIdx, pt, before, after}]

// Position marker (blue dot)
let posMarker = null;

// ── Persist ───────────────────────────────────────────────────────────────────
(function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const d = JSON.parse(raw);
    if (d.segments) segments = d.segments;
    if (d.metric !== undefined) metric = d.metric;
    totalDist = computeTotalDist();
  } catch(e) {}
})();

function saveStorage() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ segments, metric })); } catch(e) {}
}

// ── Map ───────────────────────────────────────────────────────────────────────
const map = L.map('map', { center: [40,-20], zoom: 3, zoomControl: false, attributionControl: true });

// Create a custom pane for the fog that sits above tiles but below markers
map.createPane('fogPane');
map.getPane('fogPane').style.zIndex = 350;
map.getPane('fogPane').style.pointerEvents = 'none';

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png',    { maxZoom: 19 }).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', { maxZoom: 19, pane: 'shadowPane' }).addTo(map);

map.on('dragstart', () => { if (!drawMode && !editMode) setFollow(false); });
map.on('move zoom resize viewreset', redrawFog);
map.on('click', onMapClick);

// ── Canvas ────────────────────────────────────────────────────────────────────
// Append canvas into the fogPane so Leaflet's own z-index stacking puts it
// below markers (markerPane z-index 600) automatically.
const canvas = document.getElementById('fog-canvas');
map.getPane('fogPane').appendChild(canvas);
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const r = document.getElementById('map').getBoundingClientRect();
  canvas.width  = r.width;
  canvas.height = r.height;
  // Position relative to the map container; the pane is already inside it
  canvas.style.cssText =
    `position:absolute;top:0;left:0;` +
    `width:${r.width}px;height:${r.height}px;pointer-events:none;`;
}

// ── Fog render ────────────────────────────────────────────────────────────────
function metersToPixels(lat, m) {
  const p1 = map.latLngToContainerPoint([lat, 0]);
  const p2 = map.latLngToContainerPoint([lat + m / 111320, 0]);
  return Math.abs(p2.y - p1.y);
}

function buildMask(w, h, radiusM) {
  const c = new OffscreenCanvas(w, h);
  const x = c.getContext('2d');
  x.fillStyle = x.strokeStyle = 'rgba(0,0,0,1)';
  x.lineJoin = 'round'; x.lineCap = 'round';

  // GPS position shown as its own island (dot only, no connection to segments)
  const segs = currentPos ? [...segments, [currentPos]] : segments;

  for (const seg of segs) {
    if (!seg.length) continue;
    const r  = metersToPixels(seg[0].lat, radiusM);
    x.lineWidth = r * 2;
    const p0 = map.latLngToContainerPoint([seg[0].lat, seg[0].lng]);
    x.beginPath(); x.arc(p0.x, p0.y, r, 0, Math.PI * 2); x.fill();
    for (let i = 1; i < seg.length; i++) {
      const pa = map.latLngToContainerPoint([seg[i-1].lat, seg[i-1].lng]);
      const pb = map.latLngToContainerPoint([seg[i].lat,   seg[i].lng]);
      x.beginPath(); x.moveTo(pa.x, pa.y); x.lineTo(pb.x, pb.y); x.stroke();
      x.beginPath(); x.arc(pb.x, pb.y, r, 0, Math.PI * 2); x.fill();
    }
  }
  return c;
}

function redrawFog() {
  resizeCanvas();
  const w = canvas.width, h = canvas.height;

  // In draw/edit mode, outer fog matches mid fog so the whole map is navigable
  const outerOpacity = (drawMode || editMode) ? FOG_EDIT : FOG_OUTER;

  const f  = new OffscreenCanvas(w, h);
  const fc = f.getContext('2d');

  fc.fillStyle = `rgba(14,14,14,${outerOpacity})`;
  fc.fillRect(0, 0, w, h);

  const segs = currentPos ? [...segments, [currentPos]] : segments;
  if (!segs.some(s => s.length > 0)) {
    ctx.clearRect(0, 0, w, h); ctx.drawImage(f, 0, 0); return;
  }

  const midMask   = buildMask(w, h, MID_R_M);
  const innerMask = buildMask(w, h, INNER_R_M);

  // Mid layer: FOG_MID opacity, clipped to mid mask shape
  const midLayer = new OffscreenCanvas(w, h);
  const mc = midLayer.getContext('2d');
  mc.drawImage(midMask, 0, 0);
  mc.globalCompositeOperation = 'source-in';
  mc.fillStyle = `rgba(14,14,14,${FOG_MID})`;
  mc.fillRect(0, 0, w, h);

  // Replace outer pixels in mid zone with mid fog
  fc.globalCompositeOperation = 'destination-out';
  fc.drawImage(midMask, 0, 0);
  fc.globalCompositeOperation = 'source-over';
  fc.drawImage(midLayer, 0, 0);

  // Punch inner zone fully clear
  fc.globalCompositeOperation = 'destination-out';
  fc.drawImage(innerMask, 0, 0);

  ctx.clearRect(0, 0, w, h);
  ctx.drawImage(f, 0, 0);
}

// ── GPS tracking ──────────────────────────────────────────────────────────────
function toggleTracking() { tracking ? stopTracking() : startTracking(); }

function startTracking() {
  if (!navigator.geolocation) return;
  tracking = true;
  activeSegIdx = null;
  setFollow(true);
  updateUI();
  watchId = navigator.geolocation.watchPosition(onPosition, onGpsError,
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 });
}

function stopTracking() {
  if (watchId != null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  tracking     = false;
  activeSegIdx = null;
  currentPos   = null;
  if (posMarker) { map.removeLayer(posMarker); posMarker = null; }
  document.getElementById('s-acc-wrap').style.display = 'none';
  document.getElementById('follow-btn').style.display = 'none';
  saveStorage();
  updateUI();
  redrawFog();
}

function onPosition(pos) {
  const { latitude: lat, longitude: lng, accuracy: acc } = pos.coords;

  // Accuracy display — always update
  const accEl = document.getElementById('s-acc');
  const accM  = Math.round(acc);
  accEl.textContent = metric ? `±${accM} m` : `±${Math.round(acc * 3.281)} ft`;
  accEl.className   = 'stat-val ' + (acc < 50 ? 'good' : acc < 100 ? 'warn' : 'bad');
  document.getElementById('s-acc-wrap').style.display = 'flex';

  // Track raw position on every fix (used for immediate follow recentering)
  rawPos = { lat, lng };

  // Always show blue dot at current estimated position
  updatePosMarker(lat, lng);
  if (followMe) map.setView([lat, lng], Math.max(map.getZoom(), 16), { animate: true, duration: 0.5 });

  // Only reveal map if accuracy is sufficient
  if (acc >= MAX_ACCURACY_M) return;

  if (activeSegIdx === null) {
    segments.push([{ lat, lng }]);
    activeSegIdx = segments.length - 1;
  } else {
    const seg  = segments[activeSegIdx];
    const last = seg[seg.length - 1];
    const d    = haversine(last.lat, last.lng, lat, lng);

    if (d < MIN_DIST_M) return; // too close, skip

    // Check proximity to ANY existing point across ALL segments
    if (nearAnyExistingPoint(lat, lng, MIN_DIST_M)) return;

    if (d >= MAX_GAP_M) {
      // Large gap — new island
      segments.push([{ lat, lng }]);
      activeSegIdx = segments.length - 1;
    } else {
      totalDist += d;
      seg.push({ lat, lng });
    }
  }

  saveStorage();
  updateStats();
  redrawFog();
}

function nearAnyExistingPoint(lat, lng, threshold) {
  for (const seg of segments) {
    for (const pt of seg) {
      if (haversine(pt.lat, pt.lng, lat, lng) < threshold) return true;
    }
  }
  return false;
}

function onGpsError() { stopTracking(); }

function updatePosMarker(lat, lng) {
  const icon = L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;border-radius:50%;background:#00A0E0;border:3px solid #F0F0F0;box-shadow:0 0 0 4px rgba(0,160,224,0.25)"></div>`,
    iconAnchor: [7, 7],
  });
  if (posMarker) posMarker.setLatLng([lat, lng]);
  else posMarker = L.marker([lat, lng], { icon, zIndexOffset: 2000 }).addTo(map);
}

// ── Draw path mode ────────────────────────────────────────────────────────────
function drawBtnAction() {
  if (drawMode)      doneDraw();
  else if (editMode) doneEdit();
  else               startDraw();
}

function menuBtnAction() {
  if (drawMode)      undoDraw();
  else if (editMode) undoEdit();
  else               openMenu();
}

function startDraw() {
  drawMode = true;
  drawSegment = [];
  document.getElementById('map').classList.add('drawing');
  updateUI();
  redrawFog(); // lighten outer fog
}

function doneDraw() {
  if (drawSegment.length > 0) {
    const pts = [drawSegment[0]];
    for (let i = 1; i < drawSegment.length; i++) {
      pts.push(...interpolate(drawSegment[i-1], drawSegment[i], 30));
    }
    segments.push(pts);
    totalDist += segmentLength(pts);
    saveStorage();
    updateStats();
  }
  endDraw();
  redrawFog();
}

function undoDraw() {
  if (drawSegment.length === 0) { endDraw(); return; }
  drawSegment.pop();
  const m = drawMarkers.pop();
  if (m) map.removeLayer(m);
  if (drawPolyline) { map.removeLayer(drawPolyline); drawPolyline = null; }
  if (drawSegment.length > 1) {
    drawPolyline = L.polyline(
      drawSegment.map(p => [p.lat, p.lng]),
      { color: '#00A0E0', weight: 2, opacity: 0.7, dashArray: '6 4' }
    ).addTo(map);
  }
  if (drawSegment.length === 0) endDraw();
}

function endDraw() {
  drawMode = false;
  drawMarkers.forEach(m => map.removeLayer(m)); drawMarkers = [];
  if (drawPolyline) { map.removeLayer(drawPolyline); drawPolyline = null; }
  drawSegment = [];
  document.getElementById('map').classList.remove('drawing');
  updateUI();
  redrawFog(); // restore outer fog
}

// ── Edit mode ─────────────────────────────────────────────────────────────────
function startEdit() {
  closeMenu();
  if (tracking) stopTracking();
  editMode      = true;
  editUndoStack = [];
  document.getElementById('map').classList.add('editing');
  showEditMarkers();
  updateUI();
  redrawFog(); // lighten outer fog
}

function showEditMarkers() {
  clearEditMarkers();
  segments.forEach((seg, si) => {
    seg.forEach((pt, pi) => {
      const marker = makeEditMarker(pt, si, pi);
      editMarkers.push({ marker, segIdx: si, ptIdx: pi });
    });
  });
}

function makeEditMarker(pt, si, pi) {
  const icon = L.divIcon({
    className: '',
    html: `<div style="width:22px;height:22px;border-radius:50%;background:#00A0E0;border:3px solid #F0F0F0;box-shadow:0 0 8px rgba(0,160,224,0.6);cursor:pointer"></div>`,
    iconAnchor: [11, 11],
  });
  const marker = L.marker([pt.lat, pt.lng], { icon, zIndexOffset: 2000 }).addTo(map);
  marker.on('click', (e) => {
    L.DomEvent.stopPropagation(e);
    removePoint(si, pi);
  });
  return marker;
}

function clearEditMarkers() {
  editMarkers.forEach(e => map.removeLayer(e.marker));
  editMarkers = [];
}

function removePoint(segIdx, ptIdx) {
  const seg = segments[segIdx];
  if (!seg) return;

  const removedPt = seg[segIdx]; // for undo
  // Store enough to reverse: the full segment before removal, plus indices
  editUndoStack.push({
    segIdx,
    ptIdx,
    pt: seg[ptIdx],
    segBefore: seg.slice(),  // full copy of segment before split
  });

  // Split segment at removed point
  const before = seg.slice(0, ptIdx);
  const after  = seg.slice(ptIdx + 1);
  const newSegs = [];
  if (before.length > 0) newSegs.push(before);
  if (after.length  > 0) newSegs.push(after);

  segments.splice(segIdx, 1, ...newSegs);

  totalDist = computeTotalDist();
  saveStorage();
  updateStats();
  showEditMarkers();
  redrawFog();
}

function undoEdit() {
  if (editUndoStack.length === 0) {
    // Nothing to undo — exit edit mode
    doneEdit();
    return;
  }
  const last = editUndoStack.pop();
  // Restore the full segment as it was before the removal
  // We need to figure out where the replacement segments are now
  // Simplest correct approach: restore segBefore in place of the
  // (up to) two segments that replaced it.
  // The splice inserted 0–2 segments at last.segIdx; remove them and put segBefore back.
  const before = last.segBefore.slice(0, last.ptIdx);
  const after  = last.segBefore.slice(last.ptIdx + 1);
  const insertedCount = (before.length > 0 ? 1 : 0) + (after.length > 0 ? 1 : 0);

  segments.splice(last.segIdx, insertedCount, last.segBefore);

  totalDist = computeTotalDist();
  saveStorage();
  updateStats();
  showEditMarkers();
  redrawFog();
}

function doneEdit() {
  editMode      = false;
  editUndoStack = [];
  clearEditMarkers();
  document.getElementById('map').classList.remove('editing');
  updateUI();
  redrawFog(); // restore outer fog
}

// ── Map click ─────────────────────────────────────────────────────────────────
function onMapClick(e) {
  if (!drawMode) return;
  const pt = { lat: e.latlng.lat, lng: e.latlng.lng };
  drawSegment.push(pt);

  const icon = L.divIcon({
    className: '',
    html: `<div style="width:18px;height:18px;border-radius:50%;background:#00A0E0;border:3px solid #F0F0F0;box-shadow:0 0 8px rgba(0,160,224,0.5)"></div>`,
    iconAnchor: [9, 9],
  });
  drawMarkers.push(L.marker([pt.lat, pt.lng], { icon, zIndexOffset: 2000 }).addTo(map));

  if (drawPolyline) map.removeLayer(drawPolyline);
  if (drawSegment.length > 1) {
    drawPolyline = L.polyline(
      drawSegment.map(p => [p.lat, p.lng]),
      { color: '#00A0E0', weight: 2, opacity: 0.7, dashArray: '6 4' }
    ).addTo(map);
  }
}

// ── Menu ──────────────────────────────────────────────────────────────────────
function openMenu() {
  document.getElementById('units-btn').textContent =
    metric ? 'Use imperial units' : 'Use metric units';
  document.getElementById('menu-overlay').classList.add('open');
}
function closeMenu() {
  document.getElementById('menu-overlay').classList.remove('open');
}
function onOverlayClick(e) {
  if (e.target === document.getElementById('menu-overlay')) closeMenu();
}
function menuSave() {
  closeMenu();
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob(
      [JSON.stringify({ version: 6, segments })],
      { type: 'application/json' }
    )),
    download: 'explore-data.json',
  });
  a.click();
}
function menuLoad(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      segments  = d.segments || (d.trail ? [d.trail] : []);
      totalDist = computeTotalDist();
      updateStats(); saveStorage();
      const last = segments.flatMap(s => s).pop();
      if (last) map.setView([last.lat, last.lng], 12);
      redrawFog();
    } catch(err) {}
  };
  reader.readAsText(file);
  e.target.value = '';
  closeMenu();
}
function toggleUnits() {
  metric = !metric;
  document.getElementById('units-btn').textContent =
    metric ? 'Use imperial units' : 'Use metric units';
  saveStorage();
  updateStats();
  // Menu stays open (step 9 from previous round)
}
function menuClear() {
  if (!confirm('Clear all data?')) return;
  if (tracking) stopTracking();
  if (drawMode) endDraw();
  if (editMode) doneEdit();
  segments = []; totalDist = 0; currentPos = null;
  saveStorage(); updateStats(); redrawFog();
  closeMenu();
}

// ── Follow ────────────────────────────────────────────────────────────────────
function setFollow(val) {
  followMe = val;
  const btn = document.getElementById('follow-btn');
  btn.textContent = val ? 'Following' : 'Follow';
  if (val) {
    btn.classList.add('active');
    // Immediately recenter on most recent raw position if known
    const pos = rawPos || currentPos;
    if (pos) {
      map.setView([pos.lat, pos.lng],
        Math.max(map.getZoom(), 16), { animate: true, duration: 0.5 });
    }
  } else {
    btn.classList.remove('active');
  }
}
function toggleFollow() { setFollow(!followMe); }

// ── UI ────────────────────────────────────────────────────────────────────────
function updateUI() {
  const mainBtn  = document.getElementById('main-btn');
  const menuBtn  = document.getElementById('menu-btn');
  const drawBtn  = document.getElementById('draw-btn');
  const followBtn = document.getElementById('follow-btn');

  if (editMode) {
    mainBtn.disabled = true;
    mainBtn.textContent = 'Use location';
    mainBtn.className = '';
    menuBtn.textContent = 'Undo';
    drawBtn.textContent = 'Done';
    drawBtn.classList.add('active');
    followBtn.style.display = 'none';
  } else if (drawMode) {
    mainBtn.disabled = false;
    mainBtn.textContent = tracking ? 'Stop tracking' : 'Use location';
    mainBtn.className = tracking ? 'tracking' : '';
    menuBtn.textContent = 'Undo';
    drawBtn.textContent = 'Done';
    drawBtn.classList.add('active');
    followBtn.style.display = tracking ? 'block' : 'none';
  } else {
    mainBtn.disabled = false;
    mainBtn.textContent = tracking ? 'Stop tracking' : 'Use location';
    mainBtn.className = tracking ? 'tracking' : '';
    menuBtn.textContent = 'Menu';
    drawBtn.textContent = 'Draw path';
    drawBtn.classList.remove('active');
    followBtn.style.display = tracking ? 'block' : 'none';
  }
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('s-dist').textContent = fmtDist(totalDist);
  document.getElementById('s-area').textContent = fmtArea(computeArea());
}

function computeTotalDist() {
  return segments.reduce((s, seg) => s + segmentLength(seg), 0);
}

function segmentLength(seg) {
  let d = 0;
  for (let i = 1; i < seg.length; i++)
    d += haversine(seg[i-1].lat, seg[i-1].lng, seg[i].lat, seg[i].lng);
  return d;
}

function computeArea() {
  // Corridor approximation: π r² per isolated point, 2r × length strip per segment
  const r = INNER_R_M;
  let area = 0;
  for (const seg of segments) {
    if (!seg.length) continue;
    area += Math.PI * r * r; // first cap
    for (let i = 1; i < seg.length; i++) {
      area += haversine(seg[i-1].lat, seg[i-1].lng, seg[i].lat, seg[i].lng) * 2 * r;
      area += Math.PI * r * r; // cap per subsequent point (slight overcount, acceptable)
    }
  }
  return area;
}

function fmtDist(m) {
  if (metric) return m >= 1000 ? `${(m/1000).toFixed(2)} km` : `${Math.round(m)} m`;
  const ft = m * 3.281;
  return ft >= 5280 ? `${(ft/5280).toFixed(2)} mi` : `${Math.round(ft)} ft`;
}

function fmtArea(sqm) {
  if (metric) {
    if (sqm >= 1e6) return `${(sqm/1e6).toFixed(2)} km²`;
    if (sqm >= 1e4) return `${(sqm/1e4).toFixed(1)} ha`;
    return `${Math.round(sqm)} m²`;
  }
  const sqft = sqm * 10.764;
  if (sqft >= 27878400) return `${(sqft/27878400).toFixed(2)} mi²`;
  if (sqft >= 43560)    return `${(sqft/43560).toFixed(1)} ac`;
  return `${Math.round(sqft)} ft²`;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000, dL = (lat2-lat1)*Math.PI/180, dG = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dL/2)**2 +
    Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dG/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function interpolate(a, b, stepM) {
  const total = haversine(a.lat, a.lng, b.lat, b.lng);
  const steps = Math.max(1, Math.floor(total / stepM));
  const pts   = [];
  for (let i = 1; i <= steps; i++) {
    const t = i / steps;
    pts.push({ lat: a.lat + (b.lat-a.lat)*t, lng: a.lng + (b.lng-a.lng)*t });
  }
  return pts;
}

// ── Init ──────────────────────────────────────────────────────────────────────
updateUI();
updateStats();
window.addEventListener('resize', redrawFog);
setTimeout(redrawFog, 400);
</script>
