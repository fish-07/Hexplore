<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Explore</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  height: 100%; background: #000;
  font-family: -apple-system, 'SF Pro Display', sans-serif;
  color: #fff; overflow: hidden;
}

#map { position: absolute; top: 0; left: 0; right: 0; bottom: 148px; }
#fog-canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 400; }

.leaflet-control-zoom { display: none !important; }
.leaflet-control-attribution { font-size: 9px !important; opacity: 0.35; }

/* HUD */
#hud {
  position: absolute; top: 14px; left: 14px; z-index: 500;
  background: #000;
  border: 1px solid rgba(255,255,255,0.10); border-radius: 12px;
  padding: 10px 14px; display: flex; gap: 14px; align-items: flex-start;
}
.stat { display: flex; flex-direction: column; align-items: center; gap: 2px; min-width: 44px; }
.stat-lbl { font-size: 10px; color: #606060; letter-spacing: 0.02em; }
.stat-val { font-size: 15px; font-weight: 700; color: #fff; }
.stat-val.good { color: #00c000; }
.stat-val.warn { color: #ffc000; }
.stat-val.bad  { color: #c00000; }

/* Follow button */
#follow-btn {
  position: absolute; top: 14px; right: 14px; z-index: 500;
  background: #202020;
  border: 1px solid rgba(255,255,255,0.20); border-radius: 10px;
  padding: 9px 16px; font-size: 13px; font-weight: 600; color: #fff;
  cursor: pointer; display: none;
}
#follow-btn.active { border-color: #00a0e0; background: #00a0e0; color: #fff; }

/* Bottom bar */
#bottom {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 500;
  background: #000; border-top: 1px solid rgba(255,255,255,0.08);
  padding: 12px 14px 30px; display: flex; flex-direction: column; gap: 8px;
}
#main-btn {
  width: 100%; padding: 17px; border: none; border-radius: 10px;
  font-size: 16px; font-weight: 700; cursor: pointer;
  background: #00a0e0; color: #fff; transition: background 0.15s, opacity 0.15s;
}
#main-btn.tracking { background: #c00000; color: #fff; }
#main-btn:disabled { opacity: 0.35; cursor: default; }

#sec-row { display: flex; gap: 8px; }
.sec-btn {
  flex: 1; padding: 13px 0; background: #202020;
  border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
  font-size: 14px; font-weight: 600; color: #a0a0a0; cursor: pointer;
  transition: all 0.15s; text-align: center;
}
.sec-btn:disabled { opacity: 0.30; cursor: default; }
.sec-btn.active { background: #00a0e0; border-color: #00a0e0; color: #fff; }

/* Menu overlay */
#menu-overlay {
  position: absolute; inset: 0; z-index: 600;
  background: rgba(0,0,0,0.72); backdrop-filter: blur(8px);
  display: none; align-items: flex-end; justify-content: center;
}
#menu-overlay.open { display: flex; }
#menu-panel {
  width: 100%; background: #181818;
  border-top: 1px solid rgba(255,255,255,0.10);
  border-radius: 20px 20px 0 0;
  padding: 18px 16px 40px;
  display: flex; flex-direction: column; gap: 10px;
}
.menu-btn {
  width: 100%; padding: 16px; border: none; border-radius: 10px;
  font-size: 15px; font-weight: 600; cursor: pointer;
  background: #202020; color: #d0d0d0; text-align: center; transition: background 0.12s;
}
.menu-btn.danger { color: #c00000; }
.menu-btn.back   { background: #00a0e0; color: #fff; }

#map.route-entry { cursor: crosshair; }
#map.point-edit  { cursor: pointer; }

/* Portrait lock overlay */
#rotate-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 99999;
  background: #000;
  align-items: center; justify-content: center;
  color: #606060; font-size: 16px; font-weight: 600;
}
</style>
</head>
<body>

<div id="rotate-overlay">Rotate to portrait</div>
<div id="map"></div>
<canvas id="fog-canvas"></canvas>

<div id="hud">
  <div class="stat">
    <span class="stat-lbl">Distance</span>
    <span class="stat-val" id="s-dist">0 m</span>
  </div>
  <div class="stat">
    <span class="stat-lbl">Area</span>
    <span class="stat-val" id="s-area">0 m²</span>
  </div>
  <div class="stat" id="s-acc-wrap" style="display:none">
    <span class="stat-lbl">Accuracy</span>
    <span class="stat-val" id="s-acc">—</span>
  </div>
</div>

<button id="follow-btn" onclick="toggleFollow()">Follow</button>

<div id="bottom">
  <button id="main-btn" onclick="toggleTracking()">Use location</button>
  <div id="sec-row">
    <button class="sec-btn" id="menu-btn" onclick="menuBtnAction()">Menu</button>
    <button class="sec-btn" id="draw-btn" onclick="drawBtnAction()">Draw path</button>
  </div>
</div>

<div id="menu-overlay" onclick="onOverlayClick(event)">
  <div id="menu-panel">
    <button class="menu-btn back" onclick="closeMenu()">Back</button>
    <button class="menu-btn"     onclick="startPointEdit()">Edit</button>
    <button class="menu-btn"     onclick="menuSave()">Save</button>
    <label  class="menu-btn"    >Load<input type="file" accept=".json" onchange="menuLoad(event)" style="display:none"></label>
    <button class="menu-btn" id="units-btn" onclick="toggleUnits()">Use imperial units</button>
    <button class="menu-btn danger" onclick="menuClear()">Clear data</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ── Portrait lock ─────────────────────────────────────────────────────────────
function checkOrientation() {
  const landscape = window.innerWidth > window.innerHeight;
  document.getElementById('rotate-overlay').style.display = landscape ? 'flex' : 'none';
}
window.addEventListener('resize', checkOrientation);
checkOrientation();

// ── Constants ─────────────────────────────────────────────────────────────────
const CLEAR_RADIUS_M    = 100;  // fully transparent corridor half-width (m)
const HALF_FOG_RADIUS_M = 300;  // 50% fog out to this radius (m)
const FOG_OUTER         = 0.90; // fog opacity beyond HALF_FOG_RADIUS_M
const FOG_MID           = 0.50; // fog opacity between CLEAR_RADIUS_M and HALF_FOG_RADIUS_M
const FOG_OUTER_EDITING = 0.75; // reduced outer fog during route entry or point editing
const MIN_MOVE_M        = 20;   // minimum GPS displacement to record a new tracked point (m)
const MAX_ACCURACY_M    = 100;  // discard GPS fixes with error radius >= this (m)
const NEW_ISLAND_GAP_M  = 200;  // start a new disconnected island if displacement exceeds this (m)
const STORAGE_KEY       = 'explore_v3';

// ── State ─────────────────────────────────────────────────────────────────────
let islands          = [];    // Array<Array<{lat,lng}>>; each sub-array is a contiguous visited path
let activeIslandIdx  = null;  // index of the island currently receiving GPS points
let lastKnownPos     = null;  // {lat,lng} — most recent GPS fix (any accuracy); drives the blue dot
let trackingActive   = false;
let gpsWatchId       = null;
let followEnabled    = false;
let metric           = true;
let totalDist        = 0;

// Route entry mode — user taps vertices to log a path retroactively
let routeEntryActive = false;
let routeVertices    = [];    // tapped vertices for the route being entered
let routeMarkers     = [];    // Leaflet markers for each vertex
let routePreviewLine = null;  // dashed polyline connecting vertices as a preview

// Point editing mode — user taps existing points to remove them
let pointEditActive  = false;
let pointEditMarkers = [];    // [{marker, islandIdx, ptIdx}]
let pointEditUndo    = [];    // undo stack: [{islandIdx, ptIdx, islandBefore}]

// Blue dot Leaflet marker
let posMarker = null;

// ── Persist ───────────────────────────────────────────────────────────────────
(function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const d = JSON.parse(raw);
    if (d.segments) islands = d.segments; // legacy key
    if (d.islands)  islands = d.islands;
    if (d.metric !== undefined) metric = d.metric;
    totalDist = computeTotalDist();
  } catch(e) {}
})();

function saveStorage() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ islands, metric })); } catch(e) {}
}

// ── Map ───────────────────────────────────────────────────────────────────────
const map = L.map('map', { center: [40,-20], zoom: 3, zoomControl: false, attributionControl: true });
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png',    { maxZoom: 19 }).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', { maxZoom: 19, pane: 'shadowPane' }).addTo(map);

map.on('dragstart', () => {
  // Disable follow when user manually pans, unless locked
  if (followEnabled) {
    // Prevent panning while following — consume the event by immediately re-centering
    // (Leaflet doesn't expose a way to cancel dragstart, so we re-lock on dragend instead)
  }
});
map.on('drag', () => {
  // Re-center continuously if following is on — effectively locks the map to position
  if (followEnabled && lastKnownPos) {
    map.setView([lastKnownPos.lat, lastKnownPos.lng], map.getZoom(), { animate: false });
  }
});
map.on('move zoom resize viewreset', redrawFog);
map.on('click', onMapClick);

// ── Canvas ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('fog-canvas');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
  const r = document.getElementById('map').getBoundingClientRect();
  canvas.width  = r.width;
  canvas.height = r.height;
  canvas.style.cssText =
    `position:absolute;top:${r.top}px;left:${r.left}px;` +
    `width:${r.width}px;height:${r.height}px;pointer-events:none;z-index:400`;
}

// ── Fog render ────────────────────────────────────────────────────────────────
function metersToPixels(lat, m) {
  const p1 = map.latLngToContainerPoint([lat, 0]);
  const p2 = map.latLngToContainerPoint([lat + m / 111320, 0]);
  return Math.abs(p2.y - p1.y);
}

// Build an offscreen mask canvas: opaque wherever visited paths are within radiusM
function buildRevealMask(w, h, radiusM) {
  const c = new OffscreenCanvas(w, h);
  const x = c.getContext('2d');
  x.fillStyle = x.strokeStyle = 'rgba(0,0,0,1)';
  x.lineJoin = 'round'; x.lineCap = 'round';

  // Render all committed islands; the current GPS position is its own isolated dot
  const allIslands = lastKnownPos ? [...islands, [lastKnownPos]] : islands;

  for (const island of allIslands) {
    if (!island.length) continue;
    const r  = metersToPixels(island[0].lat, radiusM);
    x.lineWidth = r * 2;
    const p0 = map.latLngToContainerPoint([island[0].lat, island[0].lng]);
    x.beginPath(); x.arc(p0.x, p0.y, r, 0, Math.PI * 2); x.fill();
    for (let i = 1; i < island.length; i++) {
      const pa = map.latLngToContainerPoint([island[i-1].lat, island[i-1].lng]);
      const pb = map.latLngToContainerPoint([island[i].lat,   island[i].lng]);
      x.beginPath(); x.moveTo(pa.x, pa.y); x.lineTo(pb.x, pb.y); x.stroke();
      x.beginPath(); x.arc(pb.x, pb.y, r, 0, Math.PI * 2); x.fill();
    }
  }
  return c;
}

function redrawFog() {
  resizeCanvas();
  const w = canvas.width, h = canvas.height;

  const editing = routeEntryActive || pointEditActive;
  const outerFogOpacity = editing ? FOG_OUTER_EDITING : FOG_OUTER;

  const f  = new OffscreenCanvas(w, h);
  const fc = f.getContext('2d');

  // Fill entire canvas with outer fog
  fc.fillStyle = `rgba(14,14,14,${outerFogOpacity})`;
  fc.fillRect(0, 0, w, h);

  const allIslands = lastKnownPos ? [...islands, [lastKnownPos]] : islands;
  if (allIslands.some(s => s.length > 0)) {
    const midMask   = buildRevealMask(w, h, HALF_FOG_RADIUS_M);
    const clearMask = buildRevealMask(w, h, CLEAR_RADIUS_M);

    // Replace outer fog with mid fog within HALF_FOG_RADIUS_M
    const midFogLayer = new OffscreenCanvas(w, h);
    const mc = midFogLayer.getContext('2d');
    mc.drawImage(midMask, 0, 0);
    mc.globalCompositeOperation = 'source-in';
    mc.fillStyle = `rgba(14,14,14,${FOG_MID})`;
    mc.fillRect(0, 0, w, h);

    fc.globalCompositeOperation = 'destination-out';
    fc.drawImage(midMask, 0, 0);
    fc.globalCompositeOperation = 'source-over';
    fc.drawImage(midFogLayer, 0, 0);

    // Punch the inner corridor fully clear
    fc.globalCompositeOperation = 'destination-out';
    fc.drawImage(clearMask, 0, 0);
  }

  ctx.clearRect(0, 0, w, h);
  ctx.drawImage(f, 0, 0);
}

// ── GPS tracking ──────────────────────────────────────────────────────────────
function toggleTracking() { trackingActive ? stopTracking() : startTracking(); }

function startTracking() {
  if (!navigator.geolocation) return;
  trackingActive  = true;
  activeIslandIdx = null;
  followEnabled   = false; // follow is OFF by default when tracking starts
  updateUI();
  gpsWatchId = navigator.geolocation.watchPosition(onGpsPosition, onGpsError,
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 });
}

function stopTracking() {
  if (gpsWatchId != null) { navigator.geolocation.clearWatch(gpsWatchId); gpsWatchId = null; }
  trackingActive  = false;
  activeIslandIdx = null;
  followEnabled   = false;
  lastKnownPos    = null;
  if (posMarker) { map.removeLayer(posMarker); posMarker = null; }
  document.getElementById('s-acc-wrap').style.display = 'none';
  document.getElementById('follow-btn').style.display = 'none';
  saveStorage();
  updateUI();
  redrawFog();
}

function onGpsPosition(pos) {
  const { latitude: lat, longitude: lng, accuracy: acc } = pos.coords;

  // Update accuracy indicator on every fix
  const accEl = document.getElementById('s-acc');
  const accM  = Math.round(acc);
  accEl.textContent = metric ? `±${accM} m` : `±${Math.round(acc * 3.281)} ft`;
  accEl.className   = 'stat-val ' + (acc < 50 ? 'good' : acc < 100 ? 'warn' : 'bad');
  document.getElementById('s-acc-wrap').style.display = 'flex';

  // Always update the blue dot regardless of accuracy
  lastKnownPos = { lat, lng };
  updateBlueDot(lat, lng);

  // If following, re-center map at current zoom (preserving user's zoom level)
  if (followEnabled) {
    map.setView([lat, lng], map.getZoom(), { animate: true, duration: 0.5 });
  }

  // Only record a revealed point if accuracy is sufficient
  if (acc >= MAX_ACCURACY_M) return;

  if (activeIslandIdx === null) {
    // No active island yet — start one
    islands.push([{ lat, lng }]);
    activeIslandIdx = islands.length - 1;
  } else {
    const island = islands[activeIslandIdx];
    const prev   = island[island.length - 1];
    const dist   = haversine(prev.lat, prev.lng, lat, lng);

    if (dist < MIN_MOVE_M) return; // hasn't moved far enough

    // Check if new point is within MIN_MOVE_M of any already-recorded point
    if (tooCloseToExistingPoint(lat, lng)) return;

    if (dist >= NEW_ISLAND_GAP_M) {
      // Large gap (e.g. accuracy dropout while moving) — start a new island
      islands.push([{ lat, lng }]);
      activeIslandIdx = islands.length - 1;
    } else {
      totalDist += dist;
      island.push({ lat, lng });
    }
  }

  saveStorage();
  updateStats();
  redrawFog();
}

function tooCloseToExistingPoint(lat, lng) {
  for (const island of islands) {
    for (const pt of island) {
      if (haversine(pt.lat, pt.lng, lat, lng) < MIN_MOVE_M) return true;
    }
  }
  return false;
}

function onGpsError() { stopTracking(); }

function updateBlueDot(lat, lng) {
  const icon = L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;border-radius:50%;background:#00a0e0;border:3px solid #fff;box-shadow:0 0 0 4px rgba(0,160,224,0.25)"></div>`,
    iconAnchor: [7, 7],
  });
  if (posMarker) posMarker.setLatLng([lat, lng]);
  else posMarker = L.marker([lat, lng], { icon, zIndexOffset: 2000 }).addTo(map);
}

// ── Route entry mode ──────────────────────────────────────────────────────────
function drawBtnAction() {
  if (routeEntryActive) confirmRouteEntry();
  else if (pointEditActive) confirmPointEdit();
  else startRouteEntry();
}

function menuBtnAction() {
  if (routeEntryActive) undoRouteVertex();
  else if (pointEditActive) undoPointRemoval();
  else openMenu();
}

function startRouteEntry() {
  routeEntryActive = true;
  routeVertices    = [];
  document.getElementById('map').classList.add('route-entry');
  updateUI();
  redrawFog();
}

function confirmRouteEntry() {
  if (routeVertices.length > 0) {
    // Interpolate between each pair of tapped vertices at 30m intervals
    const pts = [routeVertices[0]];
    for (let i = 1; i < routeVertices.length; i++) {
      pts.push(...interpolate(routeVertices[i-1], routeVertices[i], 30));
    }
    islands.push(pts);
    totalDist += islandLength(pts);
    saveStorage();
    updateStats();
  }
  cancelRouteEntry();
  redrawFog();
}

function undoRouteVertex() {
  if (routeVertices.length === 0) { cancelRouteEntry(); return; }
  routeVertices.pop();
  const m = routeMarkers.pop();
  if (m) map.removeLayer(m);
  if (routePreviewLine) { map.removeLayer(routePreviewLine); routePreviewLine = null; }
  if (routeVertices.length > 1) {
    routePreviewLine = L.polyline(
      routeVertices.map(p => [p.lat, p.lng]),
      { color: '#00a0e0', weight: 2, opacity: 0.7, dashArray: '6 4' }
    ).addTo(map);
  }
  if (routeVertices.length === 0) cancelRouteEntry();
}

function cancelRouteEntry() {
  routeEntryActive = false;
  routeMarkers.forEach(m => map.removeLayer(m)); routeMarkers = [];
  if (routePreviewLine) { map.removeLayer(routePreviewLine); routePreviewLine = null; }
  routeVertices = [];
  document.getElementById('map').classList.remove('route-entry');
  updateUI();
  redrawFog();
}

// ── Point editing mode ────────────────────────────────────────────────────────
function startPointEdit() {
  closeMenu();
  if (trackingActive) stopTracking();
  pointEditActive = true;
  pointEditUndo   = [];
  document.getElementById('map').classList.add('point-edit');
  renderPointEditMarkers();
  updateUI();
  redrawFog();
}

function renderPointEditMarkers() {
  clearPointEditMarkers();
  islands.forEach((island, ii) => {
    island.forEach((pt, pi) => {
      const icon = L.divIcon({
        className: '',
        html: `<div style="width:22px;height:22px;border-radius:50%;background:#00a0e0;border:3px solid #fff;box-shadow:0 0 8px rgba(0,160,224,0.6);cursor:pointer"></div>`,
        iconAnchor: [11, 11],
      });
      const marker = L.marker([pt.lat, pt.lng], { icon, zIndexOffset: 2000 }).addTo(map);
      marker.on('click', (e) => { L.DomEvent.stopPropagation(e); removePoint(ii, pi); });
      pointEditMarkers.push({ marker, islandIdx: ii, ptIdx: pi });
    });
  });
}

function clearPointEditMarkers() {
  pointEditMarkers.forEach(e => map.removeLayer(e.marker));
  pointEditMarkers = [];
}

function removePoint(islandIdx, ptIdx) {
  const island = islands[islandIdx];
  if (!island) return;

  // Save full island snapshot for undo
  pointEditUndo.push({ islandIdx, ptIdx, islandBefore: island.slice() });

  // Removing a point splits its island into two sub-islands (before and after the point)
  const before = island.slice(0, ptIdx);
  const after  = island.slice(ptIdx + 1);
  const replacement = [];
  if (before.length > 0) replacement.push(before);
  if (after.length  > 0) replacement.push(after);

  islands.splice(islandIdx, 1, ...replacement);

  totalDist = computeTotalDist();
  saveStorage();
  updateStats();
  renderPointEditMarkers();
  redrawFog();
}

function undoPointRemoval() {
  if (pointEditUndo.length === 0) { confirmPointEdit(); return; }
  const snap = pointEditUndo.pop();

  // Determine how many replacement sub-islands were inserted during the removal
  const b = snap.islandBefore.slice(0, snap.ptIdx);
  const a = snap.islandBefore.slice(snap.ptIdx + 1);
  const insertedCount = (b.length > 0 ? 1 : 0) + (a.length > 0 ? 1 : 0);

  islands.splice(snap.islandIdx, insertedCount, snap.islandBefore);

  totalDist = computeTotalDist();
  saveStorage();
  updateStats();
  renderPointEditMarkers();
  redrawFog();
}

function confirmPointEdit() {
  pointEditActive = false;
  pointEditUndo   = [];
  clearPointEditMarkers();
  document.getElementById('map').classList.remove('point-edit');
  updateUI();
  redrawFog();
}

// ── Map click handler ─────────────────────────────────────────────────────────
function onMapClick(e) {
  if (!routeEntryActive) return;
  const pt = { lat: e.latlng.lat, lng: e.latlng.lng };
  routeVertices.push(pt);

  const icon = L.divIcon({
    className: '',
    html: `<div style="width:18px;height:18px;border-radius:50%;background:#00a0e0;border:3px solid #fff;box-shadow:0 0 8px rgba(0,160,224,0.5)"></div>`,
    iconAnchor: [9, 9],
  });
  routeMarkers.push(L.marker([pt.lat, pt.lng], { icon, zIndexOffset: 2000 }).addTo(map));

  if (routePreviewLine) map.removeLayer(routePreviewLine);
  if (routeVertices.length > 1) {
    routePreviewLine = L.polyline(
      routeVertices.map(p => [p.lat, p.lng]),
      { color: '#00a0e0', weight: 2, opacity: 0.7, dashArray: '6 4' }
    ).addTo(map);
  }
}

// ── Menu ──────────────────────────────────────────────────────────────────────
function openMenu() {
  document.getElementById('units-btn').textContent =
    metric ? 'Use imperial units' : 'Use metric units';
  document.getElementById('menu-overlay').classList.add('open');
}
function closeMenu() {
  document.getElementById('menu-overlay').classList.remove('open');
}
function onOverlayClick(e) {
  if (e.target === document.getElementById('menu-overlay')) closeMenu();
}
function menuSave() {
  closeMenu();
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob(
      [JSON.stringify({ version: 7, islands })],
      { type: 'application/json' }
    )),
    download: 'explore-data.json',
  });
  a.click();
}
function menuLoad(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      // Support legacy formats
      islands   = d.islands || d.segments || (d.trail ? [d.trail] : []);
      totalDist = computeTotalDist();
      updateStats(); saveStorage();
      const last = islands.flatMap(s => s).pop();
      if (last) map.setView([last.lat, last.lng], 12);
      redrawFog();
    } catch(err) {}
  };
  reader.readAsText(file);
  e.target.value = '';
  closeMenu();
}
function toggleUnits() {
  metric = !metric;
  document.getElementById('units-btn').textContent =
    metric ? 'Use imperial units' : 'Use metric units';
  saveStorage();
  updateStats();
  // Menu stays open intentionally
}
function menuClear() {
  if (!confirm('Clear all data?')) return;
  if (trackingActive) stopTracking();
  if (routeEntryActive) cancelRouteEntry();
  if (pointEditActive) confirmPointEdit();
  islands = []; totalDist = 0; lastKnownPos = null;
  saveStorage(); updateStats(); redrawFog();
  closeMenu();
}

// ── Follow ────────────────────────────────────────────────────────────────────
function setFollow(val) {
  followEnabled = val;
  const btn = document.getElementById('follow-btn');
  btn.textContent = val ? 'Following' : 'Follow';
  btn.classList.toggle('active', val);
  if (val && lastKnownPos) {
    // Immediately re-center at the current zoom level
    map.setView([lastKnownPos.lat, lastKnownPos.lng], map.getZoom(),
      { animate: true, duration: 0.5 });
  }
}
function toggleFollow() { setFollow(!followEnabled); }

// ── UI ────────────────────────────────────────────────────────────────────────
function updateUI() {
  const mainBtn   = document.getElementById('main-btn');
  const menuBtn   = document.getElementById('menu-btn');
  const drawBtn   = document.getElementById('draw-btn');
  const followBtn = document.getElementById('follow-btn');

  if (pointEditActive) {
    mainBtn.disabled    = true;
    mainBtn.textContent = 'Use location';
    mainBtn.className   = '';
    menuBtn.textContent = 'Undo';
    drawBtn.textContent = 'Done';
    drawBtn.classList.add('active');
    followBtn.style.display = 'none';
  } else if (routeEntryActive) {
    mainBtn.disabled    = false;
    mainBtn.textContent = trackingActive ? 'Stop tracking' : 'Use location';
    mainBtn.className   = trackingActive ? 'tracking' : '';
    menuBtn.textContent = 'Undo';
    drawBtn.textContent = 'Done';
    drawBtn.classList.add('active');
    followBtn.style.display = trackingActive ? 'block' : 'none';
  } else {
    mainBtn.disabled    = false;
    mainBtn.textContent = trackingActive ? 'Stop tracking' : 'Use location';
    mainBtn.className   = trackingActive ? 'tracking' : '';
    menuBtn.textContent = 'Menu';
    drawBtn.textContent = 'Draw path';
    drawBtn.classList.remove('active');
    followBtn.style.display = trackingActive ? 'block' : 'none';
  }
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('s-dist').textContent = fmtDist(totalDist);
  document.getElementById('s-area').textContent = fmtArea(computeArea());
}

function computeTotalDist() {
  return islands.reduce((sum, island) => sum + islandLength(island), 0);
}

function islandLength(island) {
  let d = 0;
  for (let i = 1; i < island.length; i++)
    d += haversine(island[i-1].lat, island[i-1].lng, island[i].lat, island[i].lng);
  return d;
}

function computeArea() {
  // Approximation: corridor area = π r² per endpoint cap + 2r × segment length per step
  const r = CLEAR_RADIUS_M;
  let area = 0;
  for (const island of islands) {
    if (!island.length) continue;
    area += Math.PI * r * r;
    for (let i = 1; i < island.length; i++) {
      area += haversine(island[i-1].lat, island[i-1].lng, island[i].lat, island[i].lng) * 2 * r;
      area += Math.PI * r * r;
    }
  }
  return area;
}

function fmtDist(m) {
  if (metric) return m >= 1000 ? `${(m/1000).toFixed(2)} km` : `${Math.round(m)} m`;
  const ft = m * 3.281;
  return ft >= 5280 ? `${(ft/5280).toFixed(2)} mi` : `${Math.round(ft)} ft`;
}

function fmtArea(sqm) {
  if (metric) {
    if (sqm >= 1e6) return `${(sqm/1e6).toFixed(2)} km²`;
    if (sqm >= 1e4) return `${(sqm/1e4).toFixed(1)} ha`;
    return `${Math.round(sqm)} m²`;
  }
  const sqft = sqm * 10.764;
  if (sqft >= 27878400) return `${(sqft/27878400).toFixed(2)} mi²`;
  if (sqft >= 43560)    return `${(sqft/43560).toFixed(1)} ac`;
  return `${Math.round(sqft)} ft²`;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000, dL = (lat2-lat1)*Math.PI/180, dG = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dL/2)**2 +
    Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dG/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// Produce evenly-spaced interpolated points between two coordinates, every stepM metres
function interpolate(a, b, stepM) {
  const total = haversine(a.lat, a.lng, b.lat, b.lng);
  const steps = Math.max(1, Math.floor(total / stepM));
  const pts   = [];
  for (let i = 1; i <= steps; i++) {
    const t = i / steps;
    pts.push({ lat: a.lat + (b.lat-a.lat)*t, lng: a.lng + (b.lng-a.lng)*t });
  }
  return pts;
}

// ── Init ──────────────────────────────────────────────────────────────────────
updateUI();
updateStats();
window.addEventListener('resize', redrawFog);
setTimeout(redrawFog, 400);
</script>
