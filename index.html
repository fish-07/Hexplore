<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Hexploration">
<meta name="theme-color" content="#101010">
<title>Hexploration</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg:      #101010;
    --surface: #202020;
    --muted:   #404040;
    --text:    #fff;
    --accent:  #00a0e0;
    --danger:  #c00000;
    --safe-t:  env(safe-area-inset-top, 0px);
    --safe-b:  env(safe-area-inset-bottom, 0px);
    --safe-l:  env(safe-area-inset-left, 0px);
    --safe-r:  env(safe-area-inset-right, 0px);
  }

  html { background: #101010; }

  body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    color: var(--text);
    user-select: none; -webkit-user-select: none;
  }

  #map, #fog-svg {
    position: fixed;
    top: var(--safe-t);
    left: var(--safe-l);
    right: var(--safe-r);
    bottom: calc(var(--bar-height, 140px) + var(--safe-b));
  }
  #fog-svg {
    pointer-events: none;
    z-index: 450;
    overflow: visible;
  }

  /* Bottom control bar */
  #bar {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: var(--surface);
    border-top: 1px solid var(--muted);
    display: flex; flex-direction: column; align-items: center;
    padding: 12px calc(14px + var(--safe-r)) 0 calc(14px + var(--safe-l));
    padding-bottom: max(36px, calc(var(--safe-b) + 16px));
    gap: 10px;
    z-index: 500;
  }
  #status-line {
    font-size: 18px; font-weight: 600;
    color: var(--accent); letter-spacing: .01em;
    padding: 2px 8px;
  }
  #button-row { display: flex; gap: 10px; width: 100%; }
  .bar-btn {
    flex: 1; height: 60px;
    border: none; outline: none; border-radius: 14px;
    background: var(--muted); color: var(--text);
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: background .15s, transform .1s;
    -webkit-appearance: none;
  }
  .bar-btn:active { transform: scale(.96); }
  .bar-btn.active   { background: var(--accent); }
  .bar-btn.done-btn { background: var(--accent); }

  /* Menu sheet */
  #menu-overlay { display: none; position: fixed; inset: 0; z-index: 600; }
  #menu-overlay.open { display: block; }
  #menu-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.5); }
  #menu-sheet {
    position: absolute; left: 0; right: 0; bottom: 0;
    background: var(--surface);
    border-radius: 22px 22px 0 0;
    padding: 14px calc(16px + var(--safe-r)) 0 calc(16px + var(--safe-l));
    padding-bottom: max(36px, calc(var(--safe-b) + 16px));
    display: flex; flex-direction: column; gap: 10px;
  }
  #menu-handle {
    width: 40px; height: 4px; border-radius: 2px;
    background: var(--muted); align-self: center; margin-bottom: 4px;
  }
  .menu-btn {
    width: 100%; height: 54px;
    border: none; outline: none; border-radius: 14px;
    background: var(--muted); color: var(--text);
    font-size: 17px; font-weight: 600; cursor: pointer;
    -webkit-appearance: none;
    transition: background .15s, transform .1s;
  }
  .menu-btn:active { transform: scale(.98); }
  .menu-btn.danger   { background: var(--danger); color: #fff; }
  .menu-btn.back-btn { background: var(--accent); color: #fff; }

  /* Confirm dialog */
  #confirm-overlay {
    display: none; position: fixed; inset: 0; z-index: 700;
    background: rgba(0,0,0,.65);
    align-items: center; justify-content: center;
  }
  #confirm-overlay.open { display: flex; }
  #confirm-box {
    background: var(--surface); border-radius: 20px;
    padding: 28px 20px 20px;
    width: min(300px, 88vw);
    display: flex; flex-direction: column; gap: 16px; align-items: center;
  }
  #confirm-box p { font-size: 20px; font-weight: 700; text-align: center; }
  .confirm-row { display: flex; gap: 10px; width: 100%; }
  .confirm-row button {
    flex: 1; height: 50px;
    border: none; outline: none; border-radius: 13px;
    font-size: 16px; font-weight: 600; cursor: pointer;
    -webkit-appearance: none;
  }
  #confirm-cancel { background: var(--muted); color: var(--text); }
  #confirm-ok     { background: var(--danger); color: #fff; }

  .leaflet-control-attribution {
    background: rgba(16,16,16,0.7) !important;
    color: #aaa !important;
  }
  .leaflet-control-attribution a { color: #00a0e0 !important; }
</style>
</head>
<body>

<!-- Hidden probes sized purely by env(safe-area-inset-*). JS measures
     their actual rendered size to get reliable safe-area values, since
     iOS Safari can report a stale env() value for a moment right after
     a landscape <-> portrait rotation. -->
<div id="probe-t" style="position:fixed;top:0;left:0;width:1px;height:env(safe-area-inset-top,0px);visibility:hidden;"></div>
<div id="probe-b" style="position:fixed;bottom:0;left:0;width:1px;height:env(safe-area-inset-bottom,0px);visibility:hidden;"></div>
<div id="probe-l" style="position:fixed;top:0;left:0;width:env(safe-area-inset-left,0px);height:1px;visibility:hidden;"></div>
<div id="probe-r" style="position:fixed;top:0;right:0;width:env(safe-area-inset-right,0px);height:1px;visibility:hidden;"></div>

<div id="map"></div>
<svg id="fog-svg" xmlns="http://www.w3.org/2000/svg"></svg>

<div id="bar">
  <div id="status-line">0 hexagons</div>
  <div id="button-row">
    <button class="bar-btn" id="btn-menu">Menu</button>
    <button class="bar-btn" id="btn-location">Use location</button>
    <button class="bar-btn" id="btn-select">Select</button>
  </div>
</div>

<div id="menu-overlay">
  <div id="menu-backdrop"></div>
  <div id="menu-sheet">
    <div id="menu-handle"></div>
    <button class="menu-btn back-btn" id="menu-back">Back</button>
    <button class="menu-btn" id="menu-save">Save</button>
    <button class="menu-btn" id="menu-load">Load</button>
    <button class="menu-btn danger" id="menu-clear">Clear data</button>
  </div>
</div>

<div id="confirm-overlay">
  <div id="confirm-box">
    <p>Are you sure?</p>
    <div class="confirm-row">
      <button id="confirm-cancel">Cancel</button>
      <button id="confirm-ok">Clear</button>
    </div>
  </div>
</div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
'use strict';

/* ===========================================================
   HEX GRID MATH

   Hexagons are flat-top (points left/right, flat edges
   top/bottom) and laid out on an axial (q, r) grid.

   The grid lives in a fixed, latitude-independent pixel plane:
   Leaflet's zoom-0 Mercator pixel space, where the whole world
   is 256x256px and doubles in size each zoom level. Because
   this plane is flat, every hexagon is exactly the same size
   on screen at a given zoom level, anywhere on the map.

   The hexagon's circumradius (HEX_RADIUS_PX0, in zoom-0 pixels) is
   calibrated so a hexagon is exactly 100m wide corner-to-corner
   at CALIBRATION_LATITUDE. Web Mercator's scale factor varies
   with latitude (1/cos(lat)), so real-world hex size shrinks
   near the equator and grows near the poles, while staying a
   constant size in screen pixels everywhere.

   Axial -> zoom-0 pixel centre (flat-top layout):
     x = HEX_RADIUS_PX0 * 1.5 * q
     y = HEX_RADIUS_PX0 * sqrt(3) * (r + q/2)
=========================================================== */

const CALIBRATION_LATITUDE = 35;   // hex is 100m wide at this latitude
const METRES_PER_DEGREE    = 111320;
const TARGET_HEX_METRES    = 100;  // corner-to-corner width at CALIBRATION_LATITUDE

const pxPerMetreAtEquator    = (256 / 360) / METRES_PER_DEGREE;
const pxPerMetreAtCalibration = pxPerMetreAtEquator / Math.cos(CALIBRATION_LATITUDE * Math.PI / 180);
const HEX_RADIUS_PX0 = (TARGET_HEX_METRES / 2) * pxPerMetreAtCalibration; // circumradius, zoom-0 px

function hexKey(q, r) { return `${q},${r}`; }
function parseHexKey(key) {
  const [q, r] = key.split(',').map(Number);
  return { q, r };
}

// Axial -> zoom-0 pixel centre
function axialToPixel0(q, r) {
  return {
    x: HEX_RADIUS_PX0 * 1.5 * q,
    y: HEX_RADIUS_PX0 * Math.sqrt(3) * (r + q / 2),
  };
}

// LatLng -> hex key. Projects to zoom-0 pixels, converts to fractional
// axial coordinates, then rounds to the nearest hex using cube rounding.
function latLngToHexKey(lat, lng) {
  const p = map.project(L.latLng(lat, lng), 0);
  const fq = p.x * 2 / (3 * HEX_RADIUS_PX0);
  const fr = p.y / (Math.sqrt(3) * HEX_RADIUS_PX0) - fq / 2;
  const fs = -fq - fr;

  let q = Math.round(fq), r = Math.round(fr), s = Math.round(fs);
  const dq = Math.abs(q - fq), dr = Math.abs(r - fr), ds = Math.abs(s - fs);
  if      (dq > dr && dq > ds) q = -r - s;
  else if (dr > ds)            r = -q - s;

  return hexKey(q, r);
}

function hexNeighbours(q, r) {
  return [[q+1,r], [q-1,r], [q,r+1], [q,r-1], [q+1,r-1], [q-1,r+1]];
}

/* ===========================================================
   HEX SCREEN POSITION

   Goes directly from a hex's zoom-0 pixel centre to its current
   on-screen position, with no lat/lng conversion in between.
   (An earlier version round-tripped through lat/lng, which lost
   enough floating-point precision at high zoom to leave visible
   seams between adjacent hexagons.)

   map.layerPointToContainerPoint() is used for the final step
   because it accounts for the map pane's live position during
   an active drag or zoom gesture; map.getPixelOrigin() alone
   only updates once a gesture finishes, which would make the
   hex grid lag behind the map while panning.
=========================================================== */
function hexCenterOnScreen(q, r) {
  const { x, y } = axialToPixel0(q, r);
  const scale = Math.pow(2, map.getZoom());
  const absolutePixel = L.point(x * scale, y * scale);
  const origin = map.getPixelOrigin();
  const layerPoint = L.point(absolutePixel.x - origin.x, absolutePixel.y - origin.y);
  return map.layerPointToContainerPoint(layerPoint);
}

function hexCornersOnScreen(q, r) {
  const center = hexCenterOnScreen(q, r);
  const radius = HEX_RADIUS_PX0 * Math.pow(2, map.getZoom());
  const corners = [];
  for (let i = 0; i < 6; i++) {
    const angle = i * (Math.PI / 3); // flat-top: corners at 0, 60, 120...
    corners.push({
      x: center.x + radius * Math.cos(angle),
      y: center.y + radius * Math.sin(angle),
    });
  }
  return corners;
}

function hexSvgPath(q, r) {
  const corners = hexCornersOnScreen(q, r);
  const points = corners.map(p => `${p.x.toFixed(2)},${p.y.toFixed(2)}`).join(' L ');
  return `M ${points} Z`;
}

/* ===========================================================
   MAP
=========================================================== */
const map = L.map('map', {
  center: [20, 0],
  zoom: 3,
  zoomControl: false,
  attributionControl: true,
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 19,
}).addTo(map);

/* ===========================================================
   LAYOUT SYNCING

   Keeps CSS custom properties in sync with the real, current
   layout: the control bar's height, and the device's safe-area
   insets (read via hidden probe elements rather than trusting
   live CSS env(), which can briefly go stale after rotation).
=========================================================== */
function syncBarHeight() {
  const height = document.getElementById('bar').getBoundingClientRect().height;
  document.documentElement.style.setProperty('--bar-height', height + 'px');
}

function syncSafeArea() {
  const root = document.documentElement;
  const top    = document.getElementById('probe-t').getBoundingClientRect().height;
  const bottom = document.getElementById('probe-b').getBoundingClientRect().height;
  const left   = document.getElementById('probe-l').getBoundingClientRect().width;
  const right  = document.getElementById('probe-r').getBoundingClientRect().width;
  root.style.setProperty('--safe-t', top + 'px');
  root.style.setProperty('--safe-b', bottom + 'px');
  root.style.setProperty('--safe-l', left + 'px');
  root.style.setProperty('--safe-r', right + 'px');
}

function syncFogSvgSize() {
  const svg = document.getElementById('fog-svg');
  const rect = svg.getBoundingClientRect();
  svg.setAttribute('width', Math.ceil(rect.width));
  svg.setAttribute('height', Math.ceil(rect.height));
}

function syncLayout() {
  syncSafeArea();
  syncBarHeight();
  syncFogSvgSize();
  drawFog();
}

/* ===========================================================
   APP STATE
=========================================================== */
let revealedHexes = new Set();  // hex keys the user has uncovered
let trackingOn = false;         // "Use location" mode
let selectMode = false;         // "Select" mode
let userLatLng = null;          // current GPS position, or null
let userAccuracy = null;        // current GPS accuracy in metres
let watchId = null;             // geolocation watch handle
let hasSnappedToUser = false;   // whether we've auto-centred this session

/* ===========================================================
   STORAGE
=========================================================== */
const STORAGE_KEY = 'hexploration_v1';

function saveRevealedHexes() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify([...revealedHexes]));
  } catch (e) { /* storage unavailable; ignore */ }
}

function loadRevealedHexes() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) revealedHexes = new Set(JSON.parse(saved));
  } catch (e) { /* storage unavailable or corrupt; ignore */ }
}

loadRevealedHexes();

/* ===========================================================
   FOG OF WAR RENDERING

   Two SVG layers, each hex covered by exactly one of them:

     Layer A (evenodd fill): the fog colour at fogOpacity,
       with holes cut out for every revealed hex AND every
       border hex (a hex adjacent to a revealed one).

     Layer B (plain fill): just the border hexes, filled at
       borderOpacity.

   Net effect: revealed hexes are fully clear, border hexes
   are at borderOpacity, and everything else is at fogOpacity.
=========================================================== */
const fogSvg = document.getElementById('fog-svg');
const SVG_NS = 'http://www.w3.org/2000/svg';
const WORLD_RECT = 'M -99999,-99999 L 99999,-99999 L 99999,99999 L -99999,99999 Z ';

let fogLayer = null;
let borderLayer = null;
let cachedBorderHexes = null;

function getBorderHexes() {
  if (cachedBorderHexes) return cachedBorderHexes;
  cachedBorderHexes = new Set();
  for (const key of revealedHexes) {
    const { q, r } = parseHexKey(key);
    for (const [nq, nr] of hexNeighbours(q, r)) {
      const neighbourKey = hexKey(nq, nr);
      if (!revealedHexes.has(neighbourKey)) cachedBorderHexes.add(neighbourKey);
    }
  }
  return cachedBorderHexes;
}

function invalidateBorderCache() { cachedBorderHexes = null; }

function ensureFogLayers() {
  if (!fogLayer) {
    fogLayer = document.createElementNS(SVG_NS, 'path');
    fogLayer.setAttribute('fill-rule', 'evenodd');
    fogLayer.setAttribute('fill', '#101010');
    fogLayer.setAttribute('pointer-events', 'none');
    fogSvg.appendChild(fogLayer);
  }
  if (!borderLayer) {
    borderLayer = document.createElementNS(SVG_NS, 'path');
    borderLayer.setAttribute('fill', '#101010');
    borderLayer.setAttribute('pointer-events', 'none');
    fogSvg.appendChild(borderLayer);
  }
}

function redrawFog() {
  invalidateBorderCache();
  drawFog();
}

function drawFog() {
  ensureFogLayers();

  const fogOpacity    = selectMode ? 0.5 : 0.95;
  const borderOpacity = 0.5;
  const borders = getBorderHexes();

  let fogPath = WORLD_RECT;
  for (const key of revealedHexes) {
    const { q, r } = parseHexKey(key);
    fogPath += hexSvgPath(q, r) + ' ';
  }
  for (const key of borders) {
    const { q, r } = parseHexKey(key);
    fogPath += hexSvgPath(q, r) + ' ';
  }
  fogLayer.setAttribute('fill-opacity', String(fogOpacity));
  fogLayer.setAttribute('d', fogPath);

  let borderPath = '';
  for (const key of borders) {
    const { q, r } = parseHexKey(key);
    borderPath += hexSvgPath(q, r) + ' ';
  }
  borderLayer.setAttribute('fill-opacity', String(borderOpacity));
  borderLayer.setAttribute('d', borderPath || 'M 0 0 Z');
}

/* ===========================================================
   MAP EVENTS
=========================================================== */
map.on('move zoom viewreset', drawFog);

map.on('click', (e) => {
  if (!selectMode) return;
  toggleHex(latLngToHexKey(e.latlng.lat, e.latlng.lng));
});

/* ===========================================================
   SELECT MODE — toggling hexes
=========================================================== */
function toggleHex(key) {
  if (!selectMode) return;

  // The hex the user is currently standing in can't be hidden again,
  // since it would just be instantly revealed by GPS tracking.
  if (trackingOn && userLatLng) {
    const userKey = latLngToHexKey(userLatLng.lat, userLatLng.lng);
    if (key === userKey && revealedHexes.has(key)) return;
  }

  if (revealedHexes.has(key)) revealedHexes.delete(key);
  else                          revealedHexes.add(key);

  saveRevealedHexes();
  redrawFog();
  updateStatusLine();
}

/* ===========================================================
   LOCATION TRACKING
=========================================================== */
const userLocationIcon = L.divIcon({
  className: '',
  html: '<div style="width:18px;height:18px;border-radius:50%;background:#00a0e0;border:3px solid #fff;box-shadow:0 0 8px rgba(0,160,224,.8);"></div>',
  iconSize: [18, 18],
  iconAnchor: [9, 9],
});

let userMarker = null;
let userAccuracyCircle = null;

function onPositionUpdate(position) {
  const { latitude: lat, longitude: lng, accuracy } = position.coords;
  userLatLng  = { lat, lng };
  userAccuracy = accuracy;

  if (!hasSnappedToUser) {
    hasSnappedToUser = true;
    map.setView([lat, lng], 16, { animate: false });
  }

  if (!userMarker) {
    userMarker = L.marker([lat, lng], { icon: userLocationIcon, zIndexOffset: 1000 }).addTo(map);
  } else {
    userMarker.setLatLng([lat, lng]);
  }

  if (!userAccuracyCircle) {
    userAccuracyCircle = L.circle([lat, lng], {
      radius: accuracy,
      color: '#00a0e0',
      fillColor: '#00a0e0',
      fillOpacity: 0.08,
      weight: 1,
      opacity: 0.4,
    }).addTo(map);
  } else {
    userAccuracyCircle.setLatLng([lat, lng]).setRadius(accuracy);
  }

  // Only reveal the user's current hex if GPS accuracy is good enough —
  // this is a real-world metre threshold, independent of the hex grid's
  // on-screen pixel size.
  if (accuracy < 100) {
    const key = latLngToHexKey(lat, lng);
    if (!revealedHexes.has(key)) {
      revealedHexes.add(key);
      saveRevealedHexes();
      redrawFog();
    }
  }

  updateStatusLine();
}

function onPositionError(error) {
  console.warn('Geolocation error:', error.message);
}

function startTracking() {
  trackingOn = true;
  hasSnappedToUser = false;
  document.getElementById('btn-location').textContent = 'Stop tracking';
  document.getElementById('btn-location').classList.add('active');
  watchId = navigator.geolocation.watchPosition(onPositionUpdate, onPositionError, {
    enableHighAccuracy: true,
    maximumAge: 2000,
    timeout: 10000,
  });
}

function stopTracking() {
  trackingOn = false;
  document.getElementById('btn-location').textContent = 'Use location';
  document.getElementById('btn-location').classList.remove('active');

  if (watchId !== null) {
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
  }
  if (userMarker) { map.removeLayer(userMarker); userMarker = null; }
  if (userAccuracyCircle) { map.removeLayer(userAccuracyCircle); userAccuracyCircle = null; }

  userLatLng = null;
  userAccuracy = null;
  updateStatusLine();
}

/* ===========================================================
   STATUS LINE
=========================================================== */
function updateStatusLine() {
  const el = document.getElementById('status-line');
  if (trackingOn && userAccuracy !== null) {
    el.textContent = `±${Math.round(userAccuracy)} meters`;
  } else {
    const count = revealedHexes.size;
    el.textContent = `${count} hexagon${count !== 1 ? 's' : ''}`;
  }
}

/* ===========================================================
   BOTTOM BAR BUTTONS
=========================================================== */
document.getElementById('btn-menu').addEventListener('click', () => {
  document.getElementById('menu-overlay').classList.add('open');
});

document.getElementById('btn-location').addEventListener('click', () => {
  if (!trackingOn) {
    if (!navigator.geolocation) { alert('Geolocation not supported.'); return; }
    startTracking();
  } else {
    stopTracking();
  }
});

document.getElementById('btn-select').addEventListener('click', () => {
  selectMode = !selectMode;
  const btn = document.getElementById('btn-select');
  btn.textContent = selectMode ? 'Done' : 'Select';
  btn.classList.toggle('done-btn', selectMode);
  redrawFog();
});

/* ===========================================================
   MENU SHEET
=========================================================== */
function closeMenu() {
  document.getElementById('menu-overlay').classList.remove('open');
}

document.getElementById('menu-backdrop').addEventListener('click', closeMenu);
document.getElementById('menu-back').addEventListener('click', closeMenu);

document.getElementById('menu-save').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify([...revealedHexes])], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const link = Object.assign(document.createElement('a'), {
    href: url,
    download: `hexploration-${new Date().toISOString().slice(0, 10)}.json`,
  });
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
  closeMenu();
});

document.getElementById('menu-load').addEventListener('click', () => {
  stopTracking();
  const fileInput = Object.assign(document.createElement('input'), {
    type: 'file',
    accept: '.json,application/json',
  });
  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const imported = JSON.parse(e.target.result);
        if (!Array.isArray(imported)) throw new Error('not an array');
        revealedHexes = new Set(imported);
        saveRevealedHexes();
        redrawFog();
        updateStatusLine();
        closeMenu();
      } catch {
        alert('Invalid file.');
      }
    };
    reader.readAsText(file);
  });
  fileInput.click();
});

document.getElementById('menu-clear').addEventListener('click', () => {
  document.getElementById('confirm-overlay').classList.add('open');
});

/* ===========================================================
   CLEAR DATA CONFIRMATION
=========================================================== */
document.getElementById('confirm-cancel').addEventListener('click', () => {
  document.getElementById('confirm-overlay').classList.remove('open');
});

document.getElementById('confirm-ok').addEventListener('click', () => {
  stopTracking();
  revealedHexes.clear();
  saveRevealedHexes();
  redrawFog();
  updateStatusLine();
  document.getElementById('confirm-overlay').classList.remove('open');
  closeMenu();
});

   INIT
=========================================================== */
syncLayout();
window.addEventListener('resize', syncLayout);
window.addEventListener('orientationchange', () => {
  // iOS can report stale layout/safe-area values for a moment right as
  // the rotation event fires, so re-sync now and again shortly after.
  syncLayout();
  setTimeout(syncLayout, 50);
  setTimeout(syncLayout, 300);
});
updateStatusLine();
</script>
