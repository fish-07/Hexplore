<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Hexploration">
<meta name="theme-color" content="#101010">
<title>Hexploration</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg:      #101010;
    --surface: #202020;
    --muted:   #404040;
    --text:    #fff;
    --accent:  #00a0e0;
    --danger:  #c00000;
    --safe-t:  env(safe-area-inset-top, 0px);
    --safe-b:  env(safe-area-inset-bottom, 0px);
    --safe-l:  env(safe-area-inset-left, 0px);
    --safe-r:  env(safe-area-inset-right, 0px);
  }
  html { background: #101010; }
  body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    color: var(--text);
    user-select: none; -webkit-user-select: none;
  }
  #map {
    position: fixed;
    top: var(--safe-t);
    left: var(--safe-l);
    right: var(--safe-r);
    bottom: calc(var(--bar-h, 140px) + var(--safe-b));
  }
  #fog-svg {
    position: fixed;
    top: var(--safe-t);
    left: var(--safe-l);
    right: var(--safe-r);
    bottom: calc(var(--bar-h, 140px) + var(--safe-b));
    pointer-events: none;
    z-index: 450;
    overflow: visible;
  }

  /* ── Bottom bar ── */
  #bar {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: var(--surface);
    border-top: 1px solid var(--muted);
    display: flex; flex-direction: column; align-items: center;
    padding: 12px calc(14px + var(--safe-r)) 0 calc(14px + var(--safe-l));
    padding-bottom: max(36px, calc(var(--safe-b) + 16px));
    gap: 10px;
    z-index: 500;
  }
  #status-line {
    font-size: 18px; font-weight: 600;
    color: var(--accent); letter-spacing: .01em;
    padding: 2px 8px;
  }
  #btn-row { display: flex; gap: 10px; width: 100%; }
  .bar-btn {
    flex: 1; height: 60px;
    border: none; outline: none; border-radius: 14px;
    background: var(--muted); color: var(--text);
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: background .15s, transform .1s;
    -webkit-appearance: none;
  }
  .bar-btn:active { transform: scale(.96); }
  .bar-btn.active   { background: var(--accent); }
  .bar-btn.done-btn { background: var(--accent); }

  /* ── Menu sheet ── */
  #menu-overlay { display: none; position: fixed; inset: 0; z-index: 600; }
  #menu-overlay.open { display: block; }
  #menu-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.5); }
  #menu-sheet {
    position: absolute; left: 0; right: 0; bottom: 0;
    background: var(--surface);
    border-radius: 22px 22px 0 0;
    padding: 14px calc(16px + var(--safe-r)) 0 calc(16px + var(--safe-l));
    padding-bottom: max(36px, calc(var(--safe-b) + 16px));
    display: flex; flex-direction: column; gap: 10px;
  }
  #menu-handle {
    width: 40px; height: 4px; border-radius: 2px;
    background: var(--muted); align-self: center; margin-bottom: 4px;
  }
  .menu-btn {
    width: 100%; height: 54px;
    border: none; outline: none; border-radius: 14px;
    background: var(--muted); color: var(--text);
    font-size: 17px; font-weight: 600; cursor: pointer;
    -webkit-appearance: none;
    transition: background .15s, transform .1s;
  }
  .menu-btn:active { transform: scale(.98); }
  .menu-btn.danger   { background: var(--danger); color: #fff; }
  .menu-btn.back-btn { background: var(--accent); color: #fff; }

  /* ── Confirm dialog ── */
  #confirm-overlay {
    display: none; position: fixed; inset: 0; z-index: 700;
    background: rgba(0,0,0,.65);
    align-items: center; justify-content: center;
  }
  #confirm-overlay.open { display: flex; }
  #confirm-box {
    background: var(--surface); border-radius: 20px;
    padding: 28px 20px 20px;
    width: min(300px, 88vw);
    display: flex; flex-direction: column; gap: 16px; align-items: center;
  }
  #confirm-box p { font-size: 20px; font-weight: 700; text-align: center; }
  .confirm-row { display: flex; gap: 10px; width: 100%; }
  .confirm-row button {
    flex: 1; height: 50px;
    border: none; outline: none; border-radius: 13px;
    font-size: 16px; font-weight: 600; cursor: pointer;
    -webkit-appearance: none;
  }
  #confirm-cancel { background: var(--muted); color: var(--text); }
  #confirm-ok     { background: var(--danger); color: #fff; }

  .leaflet-control-attribution {
    background: rgba(16,16,16,0.7) !important;
    color: #aaa !important;
  }
  .leaflet-control-attribution a { color: #00a0e0 !important; }
</style>
</head>
<body>

<div id="map"></div>
<svg id="fog-svg" xmlns="http://www.w3.org/2000/svg"></svg>

<div id="bar">
  <div id="status-line">0 hexagons</div>
  <div id="btn-row">
    <button class="bar-btn" id="btn-menu">Menu</button>
    <button class="bar-btn" id="btn-loc">Use location</button>
    <button class="bar-btn" id="btn-select">Select</button>
  </div>
</div>

<div id="menu-overlay">
  <div id="menu-backdrop"></div>
  <div id="menu-sheet">
    <div id="menu-handle"></div>
    <button class="menu-btn back-btn" id="menu-back">Back</button>
    <button class="menu-btn" id="menu-save">Save</button>
    <button class="menu-btn" id="menu-load">Load</button>
    <button class="menu-btn danger" id="menu-clear">Clear data</button>
  </div>
</div>

<div id="confirm-overlay">
  <div id="confirm-box">
    <p>Are you sure?</p>
    <div class="confirm-row">
      <button id="confirm-cancel">Cancel</button>
      <button id="confirm-ok">Clear</button>
    </div>
  </div>
</div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
'use strict';

/* ═══════════════════════════════════════════════════════════
   HEX GRID — defined in fixed Mercator-pixel space (zoom 0)
   ─────────────────────────────────────────────────────────
   Leaflet's default CRS (EPSG:3857 / Web Mercator) maps the
   whole world to a 256×256 px square at zoom 0, and doubles
   in size each zoom level.

   KEY IDEA: define the hex grid directly in zoom-0 pixel
   units (a fixed, latitude-independent Cartesian plane).
   Because it's already a flat pixel plane, every hex is
   automatically THE SAME SCREEN SIZE at a given zoom level,
   everywhere on the map.

   CALIBRATION: the hex should be exactly 100 m corner-to-corner
   (circumradius = 50 m) AT THE 35°N PARALLEL. Mercator's
   pixel-per-metre ratio varies with latitude (it's the same in
   x and y at any given point, scaled by 1/cos(lat)), so we
   compute that ratio at lat=35° to size R0.

   FLAT-TOP hexagons (point left/right, flat edge top/bottom):
     mx = R·1.5·q
     my = R√3·(r + q/2)
   Inverse:
     q  = mx·2/(3R)
     r  = my/(R√3) − q/2
═══════════════════════════════════════════════════════════ */

const CAL_LAT = 35;                          // calibration latitude (°N)
const MPD     = 111320;                      // metres per degree longitude at equator
const TARGET_HEX_METRES = 100;               // desired corner-to-corner width at CAL_LAT

// Web Mercator pixels-per-metre at zoom 0, at a given latitude:
// world width = 256px for 360° of longitude → px/deg(lng) = 256/360 (constant, all latitudes)
// px/metre(lng) = (256/360) / MPD  — this is also the LOCAL px/metre in the
// y-direction at that latitude, because Web Mercator is conformal
// (equal scale in x and y at every point), scaled by 1/cos(lat).
const pxPerDegLngAtZ0 = 256 / 360;
const pxPerMetreAtEquatorZ0 = pxPerDegLngAtZ0 / MPD;
const pxPerMetreAtCalLatZ0  = pxPerMetreAtEquatorZ0 / Math.cos(CAL_LAT * Math.PI / 180);

// Circumradius (R0) in zoom-0 pixels, calibrated so the hex is
// TARGET_HEX_METRES wide (corner-to-corner = 2R) at CAL_LAT.
const R0 = (TARGET_HEX_METRES / 2) * pxPerMetreAtCalLatZ0;

function ll2zoom0px(lat, lng) {
  const p = map.project(L.latLng(lat, lng), 0);
  return { mx: p.x, my: p.y };
}

// Flat-top axial from zoom-0 pixel coords
function m2fax(mx, my) {
  const fq = mx * 2 / (3 * R0);
  const fr = my / (Math.sqrt(3) * R0) - fq / 2;
  return { fq, fr };
}
function axRound(fq, fr) {
  const fs = -fq - fr;
  let q = Math.round(fq), r = Math.round(fr), s = Math.round(fs);
  const dq = Math.abs(q-fq), dr = Math.abs(r-fr), ds = Math.abs(s-fs);
  if      (dq > dr && dq > ds) q = -r - s;
  else if (dr > ds)            r = -q - s;
  return { q, r };
}
function ll2key(lat, lng) {
  const {mx,my} = ll2zoom0px(lat,lng);
  const {fq,fr} = m2fax(mx,my);
  const {q,r}   = axRound(fq,fr);
  return `${q},${r}`;
}

// Axial → zoom-0 pixel centre
function ax2px0(q, r) {
  return { mx: R0*1.5*q, my: R0*Math.sqrt(3)*(r+q/2) };
}
// Axial → LatLng (for placing markers etc, rarely needed)
function ax2ll(q, r) {
  const {mx,my} = ax2px0(q,r);
  return map.unproject(L.point(mx,my), 0);
}

function nbrs(q, r) {
  return [[q+1,r],[q-1,r],[q,r+1],[q,r-1],[q+1,r-1],[q-1,r+1]];
}
function hk(q,r)     { return `${q},${r}`; }
function parseKey(k) { const [q,r]=k.split(',').map(Number); return {q,r}; }

/* ═══════════════════════════════════════════════════════════
   MAP — standard Web Mercator with OSM street tiles
═══════════════════════════════════════════════════════════ */
const map = L.map('map', {
  center: [20, 0], zoom: 3,
  zoomControl: false, attributionControl: true,
});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors', maxZoom: 19,
}).addTo(map);

function syncBarHeight() {
  const h = document.getElementById('bar').getBoundingClientRect().height;
  document.documentElement.style.setProperty('--bar-h', h+'px');
}
function syncSvgSize() {
  const el = document.getElementById('fog-svg');
  const rect = el.getBoundingClientRect();
  el.setAttribute('width',  Math.ceil(rect.width));
  el.setAttribute('height', Math.ceil(rect.height));
}

/* ═══════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════ */
let revealed   = new Set();
let trackingOn = false;
let selectMode = false;
let userLL     = null;
let userAcc    = null;
let watchId    = null;
let hasSnapped = false;

/* ═══════════════════════════════════════════════════════════
   STORAGE
═══════════════════════════════════════════════════════════ */
const SK = 'hexploration_v1';
function store() { try { localStorage.setItem(SK,JSON.stringify([...revealed])); } catch(e){} }
function load()  { try { const d=localStorage.getItem(SK); if(d) revealed=new Set(JSON.parse(d)); } catch(e){} }
load();

/* ═══════════════════════════════════════════════════════════
   PIXEL-SPACE HEX CORNERS (screen pixels at current zoom)
   ─────────────────────────────────────────────────────────
   IMPORTANT: we must use map.latLngToContainerPoint() to find
   each hex's screen position, NOT manual pixelOrigin arithmetic.
   Leaflet updates latLngToContainerPoint continuously during
   active drag/zoom gestures (it accounts for the live CSS
   transform on the map pane), whereas map.getPixelOrigin()
   only updates once a gesture ends — using it mid-drag causes
   the hex overlay to lag behind or move the wrong direction
   relative to the map tiles.

   The hex's on-screen RADIUS still uses the fixed R0 * 2^zoom
   formula so every hex stays exactly the same pixel size at a
   given zoom level, everywhere on the map.
═══════════════════════════════════════════════════════════ */
/* ═══════════════════════════════════════════════════════════
   HEX SCREEN POSITION — direct pixel-space math, no round-trip
   ─────────────────────────────────────────────────────────
   THE SEAM BUG, EXPLAINED:
   ax2ll(q,r) converts a hex's zoom-0 pixel centre to a lat/lng
   via map.unproject(), then the old hexCenterContainerPt fed
   that lat/lng into map.latLngToContainerPoint(), which
   internally re-projects it back to pixels. That's a pixel →
   latlng → pixel round-trip through the Mercator inverse/
   forward formulas (atan/sinh etc). At zoom 0 a single pixel
   spans a huge real-world distance, so the intermediate
   lat/lng has limited effective precision relative to what's
   needed once re-projected at zoom 18+ (scale factor up to
   2^18). Two adjacent hexes round through this independently
   and can land a fraction of a pixel apart at their shared
   corner — the visible "seam". (The old pointy-top version
   computed hex centres as lat/lng directly via flat
   arithmetic, with no such round-trip, which is why it never
   showed this.)

   THE FIX: skip lat/lng entirely. Go straight from our hex's
   zoom-0 pixel centre to a "layer point" (Leaflet's absolute
   pixel space at the current zoom, relative to the map's
   pixel origin) using simple arithmetic — exactly what
   map.project() does internally, with no inverse-trig
   round-trip. Then hand that off to Leaflet's own
   layerPointToContainerPoint(), which correctly accounts for
   the map pane's LIVE position during active drag/zoom
   gestures (unlike getPixelOrigin() alone, which only updates
   once a gesture ends).
═══════════════════════════════════════════════════════════ */
function hexCenterContainerPt(q, r) {
  const { mx, my } = ax2px0(q, r);            // zoom-0 pixel centre (exact)
  const scale  = Math.pow(2, map.getZoom());  // current zoom scale factor
  const absPt  = L.point(mx * scale, my * scale); // absolute pixel @ current zoom
  const origin = map.getPixelOrigin();        // absolute pixel of layer-point (0,0)
  const layerPt = L.point(absPt.x - origin.x, absPt.y - origin.y);
  // layerPointToContainerPoint adds the map pane's current CSS transform
  // offset, which Leaflet updates continuously during drags/zooms — this
  // is the piece that keeps the hex glued to the map at every frame.
  return map.layerPointToContainerPoint(layerPt);
}

/* ═══════════════════════════════════════════════════════════
   FOG SVG RENDERER
   ─────────────────────────────────────────────────────────
   Two non-overlapping layers, each hex covered by exactly one:
   Layer A: fogOp, world rect minus (revealed ∪ borders)
   Layer B: borderOp, union of border hexes only
═══════════════════════════════════════════════════════════ */
const fogSvg = document.getElementById('fog-svg');
const NS = 'http://www.w3.org/2000/svg';

let svgFogPath = null, svgBorderPath = null;
let borderCache = null;

function getBorders() {
  if (borderCache) return borderCache;
  borderCache = new Set();
  for (const k of revealed) {
    const {q,r} = parseKey(k);
    for (const [nq,nr] of nbrs(q,r)) {
      const nk = hk(nq,nr);
      if (!revealed.has(nk)) borderCache.add(nk);
    }
  }
  return borderCache;
}
function invalidateBorders() { borderCache = null; }

function hexCornersFromContainerCentre(c) {
  const scale = Math.pow(2, map.getZoom());
  const rad   = R0 * scale;
  const pts = [];
  for (let i=0; i<6; i++) {
    const ang = i * (Math.PI/3);
    pts.push({ x: c.x + rad*Math.cos(ang), y: c.y + rad*Math.sin(ang) });
  }
  return pts;
}

function pxToPd(pts) {
  return 'M ' + pts.map(p=>`${p.x.toFixed(2)},${p.y.toFixed(2)}`).join(' L ') + ' Z';
}

function hexPathD(q, r) {
  const c = hexCenterContainerPt(q, r);
  return pxToPd(hexCornersFromContainerCentre(c));
}

const WORLD = 'M -99999,-99999 L 99999,-99999 L 99999,99999 L -99999,99999 Z ';

function buildEvenOddPath(holeKeys) {
  let d = WORLD;
  for (const k of holeKeys) {
    const {q,r} = parseKey(k);
    d += hexPathD(q,r) + ' ';
  }
  return d;
}
function buildHexUnion(keys) {
  let d = '';
  for (const k of keys) {
    const {q,r} = parseKey(k);
    d += hexPathD(q,r) + ' ';
  }
  return d || 'M 0 0 Z';
}

function ensureSvgElements() {
  if (!svgFogPath) {
    svgFogPath = document.createElementNS(NS,'path');
    svgFogPath.setAttribute('fill-rule','evenodd');
    svgFogPath.setAttribute('fill','#101010');
    svgFogPath.setAttribute('pointer-events','none');
    fogSvg.appendChild(svgFogPath);
  }
  if (!svgBorderPath) {
    svgBorderPath = document.createElementNS(NS,'path');
    svgBorderPath.setAttribute('fill','#101010');
    svgBorderPath.setAttribute('pointer-events','none');
    fogSvg.appendChild(svgBorderPath);
  }
}

function redrawFog() { invalidateBorders(); drawFog(); }

function drawFog() {
  ensureSvgElements();

  const fogOp    = selectMode ? 0.5 : 0.95;
  const borderOp = 0.5;
  const borders  = getBorders();

  svgFogPath.setAttribute('fill-opacity', String(fogOp));
  svgFogPath.setAttribute('d', buildEvenOddPath(new Set([...revealed,...borders])));

  svgBorderPath.setAttribute('fill-opacity', String(borderOp));
  svgBorderPath.setAttribute('d', buildHexUnion(borders));
}

/* ═══════════════════════════════════════════════════════════
   MAP EVENTS
═══════════════════════════════════════════════════════════ */
map.on('move zoom viewreset', drawFog);

map.on('click', (e) => {
  if (!selectMode) return;
  onHexClick(ll2key(e.latlng.lat, e.latlng.lng));
});

/* ═══════════════════════════════════════════════════════════
   HEX CLICK
═══════════════════════════════════════════════════════════ */
function onHexClick(key) {
  if (!selectMode) return;
  if (trackingOn && userLL) {
    const uk = ll2key(userLL.lat, userLL.lng);
    if (key === uk && revealed.has(key)) return;
  }
  if (revealed.has(key)) revealed.delete(key);
  else                    revealed.add(key);
  store();
  redrawFog();
  updateStatus();
}

/* ═══════════════════════════════════════════════════════════
   LOCATION
═══════════════════════════════════════════════════════════ */
const userIcon = L.divIcon({
  className: '',
  html: '<div style="width:18px;height:18px;border-radius:50%;background:#00a0e0;border:3px solid #fff;box-shadow:0 0 8px rgba(0,160,224,.8);"></div>',
  iconSize:[18,18], iconAnchor:[9,9],
});
let userMarker=null, userCircle=null;

function onPosUpdate(pos) {
  const {latitude:lat,longitude:lng,accuracy:acc} = pos.coords;
  userLL = {lat,lng}; userAcc = acc;
  if (!hasSnapped) {
    hasSnapped = true;
    map.setView([lat,lng], 16, {animate:false});
  }
  if (!userMarker) userMarker = L.marker([lat,lng],{icon:userIcon,zIndexOffset:1000}).addTo(map);
  else             userMarker.setLatLng([lat,lng]);
  if (!userCircle) {
    userCircle = L.circle([lat,lng],{radius:acc,color:'#00a0e0',fillColor:'#00a0e0',fillOpacity:0.08,weight:1,opacity:0.4}).addTo(map);
  } else {
    userCircle.setLatLng([lat,lng]).setRadius(acc);
  }
  // 100m REAL-WORLD accuracy threshold — independent of hex visual size
  if (acc < 100) {
    const key = ll2key(lat,lng);
    if (!revealed.has(key)) { revealed.add(key); store(); redrawFog(); }
  }
  updateStatus();
}

function onPosError(e) { console.warn('Geo:',e.message); }

function startTracking() {
  trackingOn=true; hasSnapped=false;
  document.getElementById('btn-loc').textContent='Stop tracking';
  document.getElementById('btn-loc').classList.add('active');
  watchId = navigator.geolocation.watchPosition(onPosUpdate, onPosError,
    {enableHighAccuracy:true, maximumAge:2000, timeout:10000});
}
function stopTracking() {
  trackingOn=false;
  document.getElementById('btn-loc').textContent='Use location';
  document.getElementById('btn-loc').classList.remove('active');
  if (watchId!==null){navigator.geolocation.clearWatch(watchId);watchId=null;}
  if (userMarker){map.removeLayer(userMarker);userMarker=null;}
  if (userCircle){map.removeLayer(userCircle);userCircle=null;}
  userLL=null; userAcc=null;
  updateStatus();
}

/* ═══════════════════════════════════════════════════════════
   STATUS
═══════════════════════════════════════════════════════════ */
function updateStatus() {
  const el = document.getElementById('status-line');
  if (trackingOn && userAcc!==null) {
    el.textContent = `±${Math.round(userAcc)} meters`;
  } else {
    const n = revealed.size;
    el.textContent = `${n} hexagon${n!==1?'s':''}`;
  }
}

/* ═══════════════════════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════════════════════ */
document.getElementById('btn-menu').addEventListener('click',()=>{
  document.getElementById('menu-overlay').classList.add('open');
});
document.getElementById('btn-loc').addEventListener('click',()=>{
  if (!trackingOn){
    if (!navigator.geolocation){alert('Geolocation not supported.');return;}
    startTracking();
  } else { stopTracking(); }
});
document.getElementById('btn-select').addEventListener('click',()=>{
  selectMode = !selectMode;
  const btn = document.getElementById('btn-select');
  btn.textContent = selectMode ? 'Done' : 'Select';
  selectMode ? btn.classList.add('done-btn') : btn.classList.remove('done-btn');
  redrawFog();
});

function closeMenu(){ document.getElementById('menu-overlay').classList.remove('open'); }
document.getElementById('menu-backdrop').addEventListener('click',closeMenu);
document.getElementById('menu-back').addEventListener('click',closeMenu);

document.getElementById('menu-save').addEventListener('click',()=>{
  const blob=new Blob([JSON.stringify([...revealed])],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=Object.assign(document.createElement('a'),{
    href:url, download:`hexploration-${new Date().toISOString().slice(0,10)}.json`
  });
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url); closeMenu();
});
document.getElementById('menu-load').addEventListener('click',()=>{
  stopTracking();
  const inp=Object.assign(document.createElement('input'),{type:'file',accept:'.json,application/json'});
  inp.addEventListener('change',()=>{
    const f=inp.files[0]; if(!f) return;
    const fr=new FileReader();
    fr.onload=e=>{
      try {
        const arr=JSON.parse(e.target.result);
        if(!Array.isArray(arr)) throw 0;
        revealed=new Set(arr); store(); redrawFog(); updateStatus(); closeMenu();
      } catch { alert('Invalid file.'); }
    };
    fr.readAsText(f);
  });
  inp.click();
});
document.getElementById('menu-clear').addEventListener('click',()=>{
  document.getElementById('confirm-overlay').classList.add('open');
});
document.getElementById('confirm-cancel').addEventListener('click',()=>{
  document.getElementById('confirm-overlay').classList.remove('open');
});
document.getElementById('confirm-ok').addEventListener('click',()=>{
  stopTracking(); revealed.clear(); store(); redrawFog(); updateStatus();
  document.getElementById('confirm-overlay').classList.remove('open');
  closeMenu();
});

/* ═══════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════ */
syncBarHeight();
syncSvgSize();
window.addEventListener('resize',()=>{ syncBarHeight(); syncSvgSize(); drawFog(); });
updateStatus();
drawFog();
</script>
