<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hexplorer">
<title>Hexplorer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg:       #101010;
    --surface:  #202020;
    --muted:    #404040;
    --text:     #fff;
    --accent:   #00a0e0;
    --danger:   #c00000;
    --bar-h:    80px;
    --safe-b:   env(safe-area-inset-bottom, 0px);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    color: var(--text);
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── Map ── */
  #map {
    position: fixed; inset: 0;
    bottom: calc(var(--bar-h) + var(--safe-b));
  }

  /* ── Bottom bar ── */
  #bar {
    position: fixed; left: 0; right: 0;
    bottom: 0;
    height: calc(var(--bar-h) + var(--safe-b));
    background: var(--surface);
    border-top: 1px solid var(--muted);
    display: flex; flex-direction: column;
    align-items: center;
    padding-bottom: var(--safe-b);
    z-index: 100;
  }

  #status-line {
    font-size: 13px;
    color: var(--accent);
    height: 20px;
    line-height: 20px;
    letter-spacing: .02em;
  }

  #btn-row {
    display: flex; gap: 8px;
    padding: 6px 12px 0;
    width: 100%;
  }

  .bar-btn {
    flex: 1;
    height: 44px;
    border: none; outline: none;
    border-radius: 12px;
    background: var(--muted);
    color: var(--text);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s, transform .1s;
    -webkit-appearance: none;
  }
  .bar-btn:active { transform: scale(.96); }
  .bar-btn.active { background: var(--accent); color: #fff; }
  .bar-btn.done-btn { background: var(--accent); }
  .bar-btn.menu-open { background: var(--muted); }

  /* ── Menu sheet ── */
  #menu-overlay {
    display: none;
    position: fixed; inset: 0;
    z-index: 200;
  }
  #menu-overlay.open { display: block; }

  #menu-backdrop {
    position: absolute; inset: 0;
    background: rgba(0,0,0,.5);
  }

  #menu-sheet {
    position: absolute; left: 0; right: 0; bottom: 0;
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 16px 16px calc(16px + var(--safe-b));
    display: flex; flex-direction: column; gap: 10px;
  }

  #menu-handle {
    width: 40px; height: 4px;
    border-radius: 2px;
    background: var(--muted);
    align-self: center;
    margin-bottom: 6px;
  }

  .menu-btn {
    width: 100%; height: 52px;
    border: none; outline: none;
    border-radius: 14px;
    background: var(--muted);
    color: var(--text);
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    -webkit-appearance: none;
    transition: background .15s, transform .1s;
  }
  .menu-btn:active { transform: scale(.98); }
  .menu-btn.danger { background: var(--danger); }
  .menu-btn.back-btn { background: var(--bg); color: var(--accent); }

  /* ── Confirm dialog ── */
  #confirm-overlay {
    display: none;
    position: fixed; inset: 0;
    z-index: 300;
    background: rgba(0,0,0,.6);
    align-items: center; justify-content: center;
  }
  #confirm-overlay.open { display: flex; }

  #confirm-box {
    background: var(--surface);
    border-radius: 18px;
    padding: 24px 20px 16px;
    width: min(320px, 90vw);
    display: flex; flex-direction: column; gap: 10px; align-items: center;
  }
  #confirm-box p { font-size: 18px; font-weight: 600; text-align: center; }
  #confirm-box small { font-size: 13px; color: #999; text-align: center; line-height: 1.4; }

  .confirm-row { display: flex; gap: 10px; width: 100%; }
  .confirm-row button {
    flex: 1; height: 48px;
    border: none; outline: none; border-radius: 12px;
    font-size: 16px; font-weight: 600; cursor: pointer;
    -webkit-appearance: none;
  }
  #confirm-cancel { background: var(--muted); color: var(--text); }
  #confirm-ok     { background: var(--danger); color: #fff; }
</style>
</head>
<body>

<!-- Map container -->
<div id="map"></div>

<!-- Bottom bar -->
<div id="bar">
  <div id="status-line">0 hexagons</div>
  <div id="btn-row">
    <button class="bar-btn" id="btn-menu">Menu</button>
    <button class="bar-btn" id="btn-loc">Use location</button>
    <button class="bar-btn" id="btn-select">Select</button>
  </div>
</div>

<!-- Menu sheet -->
<div id="menu-overlay">
  <div id="menu-backdrop"></div>
  <div id="menu-sheet">
    <div id="menu-handle"></div>
    <button class="menu-btn" id="menu-save">Save</button>
    <button class="menu-btn" id="menu-load">Load</button>
    <button class="menu-btn danger" id="menu-clear">Clear data</button>
    <button class="menu-btn back-btn" id="menu-back">Back</button>
  </div>
</div>

<!-- Confirm dialog -->
<div id="confirm-overlay">
  <div id="confirm-box">
    <p>Are you sure?</p>
    <small>This will erase all revealed hexagons and cannot be undone.</small>
    <div class="confirm-row">
      <button id="confirm-cancel">Cancel</button>
      <button id="confirm-ok">Clear</button>
    </div>
  </div>
</div>

<!-- Leaflet -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<script>
'use strict';

/* ═══════════════════════════════════════════════
   HEX GRID CONSTANTS
   100m flat-to-flat (pointy-top orientation):
   width (corner-to-corner) = 100 / cos(30°) ≈ 115.47m
   height (flat-to-flat)    = 100m
   hex grid rows offset by half width
═══════════════════════════════════════════════ */
const HEX_FLAT   = 100;   // flat-to-flat metres (what we call "100m wide")
const HEX_SIZE   = HEX_FLAT / Math.sqrt(3); // circumradius in metres ≈ 57.74m
// pointy-top hex: width = sqrt(3)*size, height = 2*size
// flat-to-flat (short diagonal) = sqrt(3)*size = 100m → size = 100/sqrt(3)

/* ═══════════════════════════════════════════════
   MAP INIT
═══════════════════════════════════════════════ */
const map = L.map('map', {
  center: [51.505, -0.09],
  zoom: 16,
  zoomControl: false,
  attributionControl: true,
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 19,
}).addTo(map);

/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
let revealedHexes = new Set();   // keys: "q,r"
let trackingOn    = false;
let selectMode    = false;
let userLatLng    = null;
let userAccuracy  = null;
let watchId       = null;
let hexLayers     = {};          // key → L.polygon
let userMarker    = null;
let userCircle    = null;

/* ═══════════════════════════════════════════════
   STORAGE
═══════════════════════════════════════════════ */
const STORE_KEY = 'hexplorer_v1';

function saveToStorage() {
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify([...revealedHexes]));
  } catch(e) {}
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) revealedHexes = new Set(JSON.parse(raw));
  } catch(e) {}
}

loadFromStorage();

/* ═══════════════════════════════════════════════
   HEX MATH  (pointy-top axial coordinates)
   Earth metres → axial (q,r) and back
═══════════════════════════════════════════════ */

// Metres per degree latitude (approx, at given lat)
function metersPerDegLat(lat) {
  return 111320;
}
function metersPerDegLon(lat) {
  return 111320 * Math.cos(lat * Math.PI / 180);
}

// Convert LatLng → fractional axial hex coords
function latlngToAxial(lat, lng, originLat, originLng) {
  const mPerDegLat = metersPerDegLat(originLat);
  const mPerDegLon = metersPerDegLon(originLat);
  const dx = (lng - originLng) * mPerDegLon;
  const dy = (lat - originLat) * mPerDegLat;
  const s  = HEX_SIZE;
  // pointy-top axial: q = (dx*sqrt3/3 - dy/3)/s, r = dy*2/3/s
  const fq = (dx * Math.sqrt(3)/3 - dy / 3) / s;
  const fr = (dy * 2/3) / s;
  return { fq, fr };
}

// Axial → rounded axial (hex coordinate)
function axialRound(fq, fr) {
  const fs = -fq - fr;
  let q = Math.round(fq), r = Math.round(fr), s = Math.round(fs);
  const dq = Math.abs(q - fq), dr = Math.abs(r - fr), ds = Math.abs(s - fs);
  if (dq > dr && dq > ds) q = -r - s;
  else if (dr > ds)         r = -q - s;
  return { q, r };
}

// Axial → centre LatLng
function axialToLatLng(q, r, originLat, originLng) {
  const s  = HEX_SIZE;
  const mPerDegLat = metersPerDegLat(originLat);
  const mPerDegLon = metersPerDegLon(originLat);
  // pointy-top: x = s * sqrt(3)*(q + r/2), y = s * 3/2 * r
  const dx = s * Math.sqrt(3) * (q + r / 2);
  const dy = s * 1.5 * r;
  return [originLat + dy / mPerDegLat, originLng + dx / mPerDegLon];
}

// Axial → 6 corner LatLngs (pointy-top)
function hexCorners(q, r, originLat, originLng) {
  const [cLat, cLng] = axialToLatLng(q, r, originLat, originLng);
  const s  = HEX_SIZE;
  const mPerDegLat = metersPerDegLat(originLat);
  const mPerDegLon = metersPerDegLon(originLat);
  const corners = [];
  for (let i = 0; i < 6; i++) {
    const angle = (Math.PI / 180) * (60 * i - 30); // pointy-top
    const dx = s * Math.cos(angle);
    const dy = s * Math.sin(angle);
    corners.push([cLat + dy / mPerDegLat, cLng + dx / mPerDegLon]);
  }
  return corners;
}

// Axial neighbours
function axialNeighbours(q, r) {
  return [
    [q+1,r],[q-1,r],[q,r+1],[q,r-1],[q+1,r-1],[q-1,r+1]
  ];
}

/* ═══════════════════════════════════════════════
   HEX RENDERING
═══════════════════════════════════════════════ */

// Use map centre as origin so coords stay reasonable
function getOrigin() {
  const c = map.getCenter();
  return { lat: c.lat, lng: c.lng };
}

// Stable origin pinned on first render, updated lazily
let originLat = map.getCenter().lat;
let originLng = map.getCenter().lng;

function hexKey(q, r) { return `${q},${r}`; }

function getOpacity(key) {
  if (revealedHexes.has(key)) return 0;
  // check if any neighbour is revealed
  const [q, r] = key.split(',').map(Number);
  for (const [nq, nr] of axialNeighbours(q, r)) {
    if (revealedHexes.has(hexKey(nq, nr))) return 0.5;
  }
  return selectMode ? 0.5 : 0.9;
}

function hexStyle(key) {
  const op = getOpacity(key);
  return {
    fillColor:   '#101010',
    fillOpacity: op,
    color:       '#404040',
    weight:      0.8,
    opacity:     op === 0 ? 0 : 0.6,
  };
}

// Which hexes are visible in the current map view?
function visibleHexKeys() {
  const bounds = map.getBounds();
  const sw = bounds.getSouthWest();
  const ne = bounds.getNorthEast();
  const padding = 2; // extra hex rows/cols

  // Convert corners to axial
  const swA = axialRound(...Object.values(latlngToAxial(sw.lat, sw.lng, originLat, originLng)));
  const neA = axialRound(...Object.values(latlngToAxial(ne.lat, ne.lng, originLat, originLng)));

  const qMin = Math.min(swA.q, neA.q) - padding;
  const qMax = Math.max(swA.q, neA.q) + padding;
  const rMin = Math.min(swA.r, neA.r) - padding;
  const rMax = Math.max(swA.r, neA.r) + padding;

  const keys = new Set();
  for (let q = qMin; q <= qMax; q++) {
    for (let r = rMin; r <= rMax; r++) {
      keys.add(hexKey(q, r));
    }
  }
  return keys;
}

// Hex overlay layer group
const hexGroup = L.layerGroup().addTo(map);

function renderHexes() {
  const visible = visibleHexKeys();

  // Remove off-screen layers
  for (const key of Object.keys(hexLayers)) {
    if (!visible.has(key)) {
      hexGroup.removeLayer(hexLayers[key]);
      delete hexLayers[key];
    }
  }

  // Add / update visible
  for (const key of visible) {
    const [q, r] = key.split(',').map(Number);
    const corners = hexCorners(q, r, originLat, originLng);
    const style   = hexStyle(key);

    if (hexLayers[key]) {
      hexLayers[key].setStyle(style);
    } else {
      const poly = L.polygon(corners, style);
      poly.on('click', (e) => onHexClick(key, e));
      hexGroup.addLayer(poly);
      hexLayers[key] = poly;
    }
  }

  updateStatusLine();
}

function refreshAllStyles() {
  for (const key of Object.keys(hexLayers)) {
    hexLayers[key].setStyle(hexStyle(key));
  }
  updateStatusLine();
}

/* ═══════════════════════════════════════════════
   HEX CLICK
═══════════════════════════════════════════════ */
function onHexClick(key, e) {
  if (!selectMode) return;
  L.DomEvent.stopPropagation(e);

  // Don't allow de-selecting the hex the user is currently in
  if (trackingOn && userLatLng) {
    const userKey = latlngToHexKey(userLatLng.lat, userLatLng.lng);
    if (key === userKey && revealedHexes.has(key)) return;
  }

  if (revealedHexes.has(key)) {
    revealedHexes.delete(key);
  } else {
    revealedHexes.add(key);
  }
  saveToStorage();
  refreshAllStyles();
}

/* ═══════════════════════════════════════════════
   LOCATION
═══════════════════════════════════════════════ */
const userIcon = L.divIcon({
  className: '',
  html: `<div style="
    width:18px;height:18px;
    border-radius:50%;
    background:#00a0e0;
    border:3px solid #fff;
    box-shadow:0 0 8px rgba(0,160,224,.8);
  "></div>`,
  iconSize: [18, 18],
  iconAnchor: [9, 9],
});

function latlngToHexKey(lat, lng) {
  const { fq, fr } = latlngToAxial(lat, lng, originLat, originLng);
  const { q, r }   = axialRound(fq, fr);
  return hexKey(q, r);
}

function onLocationUpdate(pos) {
  const { latitude: lat, longitude: lng, accuracy } = pos.coords;
  userLatLng  = { lat, lng };
  userAccuracy = accuracy;

  // Show marker
  if (!userMarker) {
    userMarker = L.marker([lat, lng], { icon: userIcon, zIndexOffset: 1000 }).addTo(map);
  } else {
    userMarker.setLatLng([lat, lng]);
  }

  // Show accuracy circle
  if (!userCircle) {
    userCircle = L.circle([lat, lng], {
      radius: accuracy,
      color: '#00a0e0',
      fillColor: '#00a0e0',
      fillOpacity: 0.08,
      weight: 1,
      opacity: 0.4,
    }).addTo(map);
  } else {
    userCircle.setLatLng([lat, lng]).setRadius(accuracy);
  }

  // Reveal hex if accuracy < 100m
  if (accuracy < 100) {
    const key = latlngToHexKey(lat, lng);
    if (!revealedHexes.has(key)) {
      revealedHexes.add(key);
      saveToStorage();
    }
  }

  renderHexes();
  updateStatusLine();
}

function onLocationError(err) {
  console.warn('Geo error', err.message);
}

function startTracking() {
  trackingOn = true;
  document.getElementById('btn-loc').textContent = 'Stop tracking';
  document.getElementById('btn-loc').classList.add('active');
  watchId = navigator.geolocation.watchPosition(onLocationUpdate, onLocationError, {
    enableHighAccuracy: true,
    maximumAge: 2000,
    timeout: 10000,
  });
}

function stopTracking() {
  trackingOn = false;
  document.getElementById('btn-loc').textContent = 'Use location';
  document.getElementById('btn-loc').classList.remove('active');
  if (watchId !== null) {
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
  }
  if (userMarker) { map.removeLayer(userMarker); userMarker = null; }
  if (userCircle) { map.removeLayer(userCircle); userCircle = null; }
  userLatLng  = null;
  userAccuracy = null;
  updateStatusLine();
  refreshAllStyles();
}

/* ═══════════════════════════════════════════════
   STATUS LINE
═══════════════════════════════════════════════ */
function updateStatusLine() {
  const el = document.getElementById('status-line');
  if (trackingOn && userAccuracy !== null) {
    const m = Math.round(userAccuracy);
    el.textContent = `±${m} meters`;
  } else {
    const n = revealedHexes.size;
    el.textContent = `${n} hexagon${n !== 1 ? 's' : ''}`;
  }
}

/* ═══════════════════════════════════════════════
   BUTTON HANDLERS
═══════════════════════════════════════════════ */
document.getElementById('btn-menu').addEventListener('click', () => {
  document.getElementById('menu-overlay').classList.add('open');
});

document.getElementById('btn-loc').addEventListener('click', () => {
  if (!trackingOn) {
    if (!navigator.geolocation) { alert('Geolocation not supported.'); return; }
    startTracking();
  } else {
    stopTracking();
  }
});

document.getElementById('btn-select').addEventListener('click', () => {
  selectMode = !selectMode;
  const btn = document.getElementById('btn-select');
  if (selectMode) {
    btn.textContent = 'Done';
    btn.classList.add('done-btn');
  } else {
    btn.textContent = 'Select';
    btn.classList.remove('done-btn');
  }
  refreshAllStyles();
});

/* ── Menu ── */
function closeMenu() {
  document.getElementById('menu-overlay').classList.remove('open');
}

document.getElementById('menu-backdrop').addEventListener('click', closeMenu);
document.getElementById('menu-back').addEventListener('click', closeMenu);

document.getElementById('menu-save').addEventListener('click', () => {
  const data = JSON.stringify([...revealedHexes]);
  const blob = new Blob([data], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `hexplorer-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  closeMenu();
});

document.getElementById('menu-load').addEventListener('click', () => {
  stopTracking();
  const input = document.createElement('input');
  input.type  = 'file';
  input.accept = '.json,application/json';
  input.addEventListener('change', () => {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const arr = JSON.parse(e.target.result);
        if (!Array.isArray(arr)) throw new Error();
        revealedHexes = new Set(arr);
        saveToStorage();
        renderHexes();
        closeMenu();
      } catch {
        alert('Invalid file.');
      }
    };
    reader.readAsText(file);
  });
  input.click();
});

document.getElementById('menu-clear').addEventListener('click', () => {
  document.getElementById('confirm-overlay').classList.add('open');
});

document.getElementById('confirm-cancel').addEventListener('click', () => {
  document.getElementById('confirm-overlay').classList.remove('open');
});

document.getElementById('confirm-ok').addEventListener('click', () => {
  stopTracking();
  revealedHexes.clear();
  saveToStorage();
  renderHexes();
  document.getElementById('confirm-overlay').classList.remove('open');
  closeMenu();
});

/* ═══════════════════════════════════════════════
   MAP EVENTS
═══════════════════════════════════════════════ */
map.on('moveend zoomend', renderHexes);

// Initial render
renderHexes();
</script>
</body>
</html>
